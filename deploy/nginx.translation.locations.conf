    # FunASR REST Proxy: 转发到本地FunASR中文转写服务 (端口8001)
    location /funasr/ {
      proxy_http_version 1.1;
      client_max_body_size 50m;

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      rewrite ^/funasr/?(.*)$ /$1 break;
      proxy_pass http://host.docker.internal:8001/;

      proxy_connect_timeout   30s;
      proxy_send_timeout      120s;
      proxy_read_timeout      120s;
    }

    # FunASR WebSocket Proxy: 浏览器 WSS → FunASR WS 流式中文转写
    location /funasr-ws/ {
      proxy_http_version 1.1;

      # WebSocket upgrade
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # /funasr-ws/stream → /ws/stream
      rewrite ^/funasr-ws/?(.*)$ /ws/$1 break;
      proxy_pass http://host.docker.internal:8001;

      proxy_connect_timeout   30s;
      proxy_send_timeout      600s;
      proxy_read_timeout      600s;
    }

    # Fish.audio TTS Proxy: 避免CORS问题
    location /fish-tts/ {
      proxy_http_version 1.1;
      client_max_body_size 10m;

      proxy_set_header Host              api.fish.audio;
      proxy_set_header X-Real-IP         $remote_addr;

      rewrite ^/fish-tts/?(.*)$ /$1 break;
      proxy_pass https://api.fish.audio/;

      proxy_connect_timeout   30s;
      proxy_send_timeout      60s;
      proxy_read_timeout      60s;

      proxy_buffering off;
    }

    # Local LLM Proxy: 转发到编译服务器LM Studio (192.168.1.41:1234)
    location /local-llm/ {
      proxy_http_version 1.1;

      # 转发header
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # 移除前缀: /local-llm/v1/chat/completions → /v1/chat/completions
      rewrite ^/local-llm/?(.*)$ /$1 break;

      # 转发到LM Studio
      proxy_pass http://192.168.1.41:1234/;

      proxy_connect_timeout   30s;
      proxy_send_timeout      120s;
      proxy_read_timeout      120s;

      # 禁用缓冲以支持流式响应
      proxy_buffering off;
    }

    # API Proxy: 转发到API代理服务
    location /api-proxy/ {
      proxy_http_version 1.1;

      # 允许较大的请求体（用于音频上传）
      client_max_body_size 100m;

      # 转发header
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # 移除前缀
      rewrite ^/api-proxy/?(.*)$ /$1 break;

      # 转发到API代理容器
      proxy_pass http://api-proxy:3010/;

      # 增加超时时间（音频处理可能需要较长时间）
      proxy_connect_timeout   120s;
      proxy_send_timeout      120s;
      proxy_read_timeout      120s;

      # 禁用缓冲以支持流式响应
      proxy_buffering off;
    }

    # n8n: Remove /n8n prefix and forward to host machine port 5678
    location /n8n {
      # Add slash for unified redirect, avoid relative path confusion
      if ($request_uri ~* "^/n8n$") { return 301 /n8n/; }

