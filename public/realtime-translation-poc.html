<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时语音翻译</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Microsoft YaHei", Arial, sans-serif; color: #182230; background: #f4f7fb; }
    main { width: min(1120px, calc(100vw - 32px)); margin: 22px auto; }
    h1 { font-size: 1.7rem; margin: 0 0 6px; letter-spacing: 0; }
    .subtitle { margin: 0 0 18px; color: #526071; line-height: 1.5; }
    .toolbar { display: grid; grid-template-columns: minmax(180px, 240px) 1fr auto; gap: 12px; align-items: end; padding: 14px; border: 1px solid #d7dde8; background: #fff; border-radius: 8px; }
    label { display: grid; gap: 6px; font-size: 0.92rem; color: #475467; }
    select, button { min-height: 44px; border-radius: 6px; border: 1px solid #c8d0dc; background: #fff; padding: 0 12px; font-size: 1rem; }
    button { color: #fff; border-color: #2563eb; background: #2563eb; cursor: pointer; font-weight: 700; }
    button.primary { min-height: 56px; font-size: 1.12rem; }
    button.secondary { color: #1f2937; border-color: #c8d0dc; background: #fff; min-width: 108px; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .status { display: flex; align-items: center; gap: 10px; min-height: 58px; margin: 12px 0; padding: 12px 14px; border: 1px solid #d7dde8; border-radius: 8px; background: #fff; color: #344054; line-height: 1.45; }
    .status::before { content: ""; width: 12px; height: 12px; border-radius: 50%; background: #98a2b3; flex: 0 0 auto; }
    .status.ready::before { background: #2563eb; }
    .status.connecting::before { background: #f59e0b; }
    .status.active::before { background: #16a34a; box-shadow: 0 0 0 5px rgba(22, 163, 74, 0.12); }
    .status.stopped::before { background: #667085; }
    .status.error { color: #842029; background: #f8d7da; border-color: #f5c2c7; }
    .status.error::before { background: #dc2626; }
    .guide { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 12px 0; }
    .step { padding: 10px 12px; border: 1px solid #d7dde8; border-radius: 8px; background: #fff; color: #475467; }
    .step strong { display: block; color: #182230; margin-bottom: 4px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .panel { min-height: 44vh; padding: 14px; border: 1px solid #d7dde8; border-radius: 8px; background: #fff; }
    .panel h2 { margin: 0 0 12px; font-size: 1rem; font-weight: 700; }
    .transcript { min-height: 34vh; white-space: pre-wrap; font-size: 1.45rem; line-height: 1.55; }
    .metrics { margin-top: 12px; color: #667085; font-size: 0.9rem; }
    audio { width: 100%; margin-top: 12px; }
    @media (max-width: 760px) {
      main { width: min(100vw - 20px, 1120px); margin: 12px auto; }
      h1 { font-size: 1.35rem; }
      .toolbar { grid-template-columns: 1fr; }
      .guide, .grid { grid-template-columns: 1fr; }
      .transcript { font-size: 1.18rem; min-height: 22vh; }
      .panel { min-height: auto; }
      button.secondary { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <h1>实时语音翻译</h1>
    <p class="subtitle">开会或沟通时，点“开始录音并实时翻译”，允许麦克风，然后直接说话。</p>
    <div class="toolbar">
      <label>翻译成
        <select id="targetLanguage">
          <option value="zh" selected>中文</option>
          <option value="en">英文</option>
          <option value="ja">日文</option>
          <option value="ko">韩文</option>
          <option value="es">西班牙语</option>
          <option value="fr">法语</option>
        </select>
      </label>
      <button id="startBtn" class="primary">开始录音并实时翻译</button>
      <button id="stopBtn" class="secondary" disabled>停止录音</button>
    </div>
    <div id="status" class="status ready">准备就绪。点“开始录音并实时翻译”后，浏览器会请求麦克风权限。</div>
    <div class="guide">
      <div class="step"><strong>1. 开始</strong>点蓝色按钮，允许麦克风。</div>
      <div class="step"><strong>2. 说话</strong>页面会实时听取现场语音。</div>
      <div class="step"><strong>3. 收听</strong>翻译声音会从下面播放器输出。</div>
    </div>
    <audio id="remoteAudio" controls autoplay aria-label="翻译后的声音输出"></audio>
    <div class="grid">
      <section class="panel">
        <h2>原文识别</h2>
        <div id="sourceText" class="transcript"></div>
      </section>
      <section class="panel">
        <h2>翻译结果</h2>
        <div id="targetText" class="transcript"></div>
        <div id="metrics" class="metrics"></div>
      </section>
    </div>
  </main>
  <script type="module">
    import { OpenAIRealtimeTranslator } from './realtime-translation.mjs';

    const targetLanguage = document.getElementById('targetLanguage');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');
    const sourceText = document.getElementById('sourceText');
    const targetText = document.getElementById('targetText');
    const metrics = document.getElementById('metrics');
    const remoteAudio = document.getElementById('remoteAudio');

    const translator = new OpenAIRealtimeTranslator({
      remoteAudio,
      onStatus(message) {
        statusEl.textContent = message;
        const isActive = message.includes('已连接') || message.includes('已收到译声');
        const isConnecting = message.includes('正在') || message.includes('申请');
        statusEl.className = `status ${isActive ? 'active' : isConnecting ? 'connecting' : 'ready'}`;
      },
      onError(error) {
        statusEl.textContent = error.message || String(error);
        statusEl.className = 'status error';
      },
      onTranscript(update) {
        sourceText.textContent = update.sourceText;
        targetText.textContent = update.targetText;
        if (update.metrics.firstAudioAt) {
          metrics.textContent = `首次译声延迟：${Math.round(update.metrics.firstAudioAt - update.metrics.startedAt)}ms`;
        }
      }
    });

    startBtn.addEventListener('click', async () => {
      sourceText.textContent = '';
      targetText.textContent = '';
      metrics.textContent = '';
      startBtn.disabled = true;
      stopBtn.disabled = false;
      try {
        await translator.start({
          targetLanguage: targetLanguage.value
        });
      } catch (error) {
        translator.stop();
        statusEl.textContent = error.message || String(error);
        statusEl.className = 'status error';
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }
    });

    stopBtn.addEventListener('click', () => {
      translator.stop();
      statusEl.textContent = '已停止录音。需要继续时，再点“开始录音并实时翻译”。';
      statusEl.className = 'status stopped';
      startBtn.disabled = false;
      stopBtn.disabled = true;
    });
  </script>
</body>
</html>
