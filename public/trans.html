<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Turn-based Translation Demo (Overlay for STT)</title>
  <!-- Font Awesome (for microphone icon) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
  />
  <!-- Add global variable definitions -->
  <script>
    // Timeout and processing status control
    const MAX_PROCESSING_TIME = 20000; // Maximum processing time 20 seconds
    let processingStartTime = 0;       // Record processing start time
    let processingTimeoutId = null;    // Add timeout ID variable
  </script>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", "微软雅黑", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
      background: #f0f0f0;
    }

    /* Main container */
    .container {
      width: 98%;
      margin: 5px auto;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      padding: 10px;
    }

    /* Language settings and status area */
    .settings-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .settings-row label {
      font-size: 0.9rem;
      color: #333;
    }
    .settings-row select {
      margin: 0 5px;
      padding: 4px 8px;
      font-size: 0.9rem;
    }
    .settings-row button {
      padding: 6px 12px;
      font-size: 0.9rem;
      cursor: pointer;
      background-color: #4c6ef5;
      color: #fff;
      border: none;
      border-radius: 4px;
      transition: background-color 0.2s ease;
    }
    .settings-row button:hover {
      background-color: #3b5ce8;
    }

    /* Inline status (ML / TL) */
    .status-inline {
      font-size: 0.9rem;
      color: #444;
      margin-left: 10px;
    }
    .status-inline span {
      font-weight: bold;
      color: #333;
    }

    /* Text box side-by-side layout */
    .text-columns {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Text area height, font */
    .column textarea {
      width: 100%;
      flex: 1;
      min-height: calc(100vh - 180px);
      padding: 8px;
      font-size: 2.4rem;
      line-height: 1.4;
      font-family: "Microsoft YaHei", "微软雅黑", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
      font-weight: 400;
    }

    /* 按钮区：发送、录音 */
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn-send,
    .btn-record {
      padding: 8px 16px;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 4px;
      border: none;
      transition: background-color 0.2s ease;
      color: #fff;
    }
    .btn-send {
      background-color: #4c6ef5;
    }
    .btn-send:hover {
      background-color: #3b5ce8;
    }
    .btn-record {
      background-color: #adb5bd;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 120px; /* 给按钮留些空间显示时长 */
    }
    .btn-record:hover {
      background-color: #868e96;
    }
    .btn-record:disabled {
      background-color: #dee2e6;
      color: #868e96;
      cursor: not-allowed;
      opacity: 0.6;
    }
    .btn-record:disabled:hover {
      background-color: #dee2e6;
    }

    /* 历史记录区域 + 折叠展开 */
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .log-title {
      font-size: 1rem;
      font-weight: bold;
      color: #333;
      border-left: 4px solid #4c6ef5;
      padding-left: 8px;
    }
    .log-toggle-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      background-color: #adb5bd;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.2s ease;
      font-size: 0.9rem;
    }
    .log-toggle-btn:hover {
      background-color: #868e96;
    }

    .log-container {
      margin-top: 10px;
      border-top: 1px solid #ccc;
      padding-top: 10px;
    }
    .log-collapsed {
      display: none;
    }

    /* 日志内容 */
    .log-item {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      font-size: 0.95rem;
      line-height: 1.3;
      white-space: pre-wrap;
      display: flex;
      transition: background-color 0.2s ease;
    }
    .log-item:hover {
      background-color: #f8f9fa;
    }
    .log-item-checkbox {
      margin-right: 12px;
      align-self: flex-start;
      margin-top: 6px;
      cursor: pointer;
      width: 18px;
      height: 18px;
    }
    .log-item-content {
      flex: 1;
    }
    
    /* 导出按钮样式 */
    .export-controls {
      display: flex;
      gap: 10px;
    }
    .export-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      background-color: #4c6ef5;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.2s ease;
      font-size: 0.9rem;
    }
    .export-btn:hover {
      background-color: #3b5ce8;
    }
    
    /* 全选容器样式 */
    .select-all-container {
      display: flex;
      align-items: center;
      padding: 8px 0;
      margin-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    .select-all-container input {
      margin-right: 8px;
      cursor: pointer;
      width: 18px;
      height: 18px;
    }
    .select-all-container label {
      font-size: 0.9rem;
      color: #555;
      cursor: pointer;
    }
    
    /* 播放按钮样式优化 */
    .audio-controls {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .audio-btn {
      padding: 8px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s ease;
      min-width: 160px;
      justify-content: center;
      height: 36px;
      background-color: #4c6ef5;
      color: white;
    }
    .audio-btn i {
      font-size: 0.9rem;
    }
    .audio-btn .duration {
      opacity: 0.8;
      font-size: 0.8rem;
    }
    .audio-btn:hover {
      background-color: #3b5ce8;
    }
    .log-item p {
      margin: 4px 0;
    }
    .log-item p:first-child {
      font-weight: bold;
      color: #333;
    }
    
    /* 导出功能样式 */
    .export-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }
    .export-btn {
      padding: 6px 12px;
      background-color: #4c6ef5;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .export-btn:hover {
      background-color: #3b5ce8;
    }
    .select-all-container {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      padding: 5px;
      background-color: #f9f9f9;
      border-radius: 4px;
    }
    .select-all-container label {
      margin-left: 5px;
      font-size: 0.9rem;
    }

    /* 播放器控制按钮样式 */
    #playPauseBtn {
      background-color: #4c6ef5;
      color: #fff;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s ease;
      min-width: 80px;
      font-size: 1rem;
    }
    #playPauseBtn:hover {
      background-color: #3b5ce8;
    }

    /* 播放器其他控件样式调整 */
    #audioPlayer {
      margin-top: 8px;
    }
    #audioPlayer > div {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #speedRange {
      width: 100px;
    }
    #progressRange {
      flex: 1;
    }

    /* ======= 新增的遮罩层(Overlay)样式 ======= */
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      display: none; /* 默认隐藏 */
      align-items: center;
      justify-content: center;
    }
    .overlay.show {
      display: flex;  /* 显示时采用flex居中 */
    }
    .overlay-content {
      background: #fff;
      padding: 20px;
      width: 90%;
      max-width: 600px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .overlay-textarea {
      width: 100%;
      min-height: 200px;
      padding: 10px;
      font-size: 1.2rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }
    #overlayStopBtn {
      background-color: #4c6ef5;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
    }
    #overlayStopBtn:hover {
      background-color: #3b5ce8;
    }

    /* 新增蓝牙麦克风相关样式 */
    .btn-record.connected {
      background-color: #4c6ef5;
    }
    .btn-record.connecting {
      background-color: #ffd43b;
    }
    .btn-record.waiting {
      animation: blinkYellow 1s infinite;
    }
    .btn-record.recording {
      animation: blinkRed 1s infinite;
    }
    @keyframes blinkYellow {
      0% { background-color: #4c6ef5; }
      50% { background-color: #748ffc; }
      100% { background-color: #4c6ef5; }
    }
    @keyframes blinkRed {
      0% { background-color: #fa5252; }
      50% { background-color: #ff8787; }
      100% { background-color: #fa5252; }
    }

    .audio-controls {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .audio-btn {
      background-color: #4c6ef5;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .audio-btn:hover {
      background-color: #3b5ce8;
    }

    /* 移动设备和双屏手机优化 */
    @media screen and (max-width: 768px) {
      .container {
        width: 99%;
        margin: 2px auto;
        padding: 8px;
        border-radius: 2px;
      }
      
      .settings-row {
        gap: 6px;
        margin-bottom: 8px;
        font-size: 0.85rem;
      }
      
      .text-columns {
        gap: 6px;
        margin-bottom: 8px;
      }
      
      .column textarea {
        min-height: calc(100vh - 140px);
        padding: 6px;
        font-size: 2.2rem;
        font-family: "Microsoft YaHei", "微软雅黑", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      }
      
      .btn-row {
        gap: 6px;
      }
      
      .btn-send, .btn-record {
        padding: 6px 12px;
        font-size: 0.9rem;
      }
      
      #audioPlayer {
        margin-top: 4px;
      }
      
      .log-container {
        margin-top: 6px;
      }
    }

    /* 双屏手机横屏模式优化 */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      .column textarea {
        min-height: calc(100vh - 100px);
      }
      
      .settings-row {
        margin-bottom: 4px;
      }
      
      .text-columns {
        margin-bottom: 4px;
      }
    }

    /* 确保在任何设备上都能最大化利用屏幕空间 */
    @media screen and (max-height: 600px) {
      .column textarea {
        min-height: calc(100vh - 120px);
      }
    }
    .lang-swap-btn {
      background: none;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
      margin: 0 4px;
      color: #666;
    }
    .lang-swap-btn:hover {
      background: #eee;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- 顶部控制栏：语言切换 + TTS开关 -->
    <div class="settings-row" style="justify-content:center; gap:18px; align-items:center; flex-wrap:wrap;">
      <span style="font-weight:bold; font-size:1.1em;">
        🎤 <span id="spanMainLang">EN</span>
      </span>
      <button id="swapLangBtn" class="lang-swap-btn" title="一键对调语言" style="font-size:1.4em; padding:4px 14px; cursor:pointer;">⇄</button>
      <span style="font-weight:bold; font-size:1.1em;">
        🔤 <span id="spanTargetLang">ZH</span>
      </span>
      <span style="margin-left:20px; font-size:0.95em; display:inline-flex; align-items:center; gap:6px;">
        <label style="cursor:pointer; display:inline-flex; align-items:center; gap:4px;" title="停止录音后自动朗读翻译">
          <input type="checkbox" id="ttsToggle" style="width:16px; height:16px; cursor:pointer;">
          <span id="ttsLabel">TTS OFF</span>
        </label>
      </span>
    </div>

    <!-- 左右文本框 -->
    <div class="text-columns">
      <!-- Left: Input box + Send/Record buttons -->
      <div class="column">
 
        <textarea id="inputText" placeholder="Type or paste text here... (Double-click to clear)"></textarea>
        <div class="btn-row">
          <button id="sendBtn" class="btn-send">Send Text</button>
          <button id="recordBtn" class="btn-record" title="系统麦克风录音">
            <i class="fas fa-microphone"></i> Record
          </button>
          <button id="gmicMicBtn" class="btn-record">
            <i class="fas fa-bluetooth"></i> GMIC-MIC01
          </button>
          <button id="gmicMicBtn2" class="btn-record">
            <i class="fas fa-bluetooth"></i> GMIC-MIC02
          </button>
        </div>
      </div>

      <!-- Right: Translation result (read-only) -->
      <div class="column">
               <textarea id="outputText" readonly placeholder="Translation result here..."></textarea>
      </div>
    </div>

    <!-- 播放器区域 -->
    <div id="audioPlayer" style="margin-top: 20px;">
      <audio id="ttsAudio" preload="auto" style="display:none;"></audio>
      <div>
        <button id="playPauseBtn">Play</button>
        <label for="speedRange">Speed:</label>
        <input type="range" id="speedRange" min="0.5" max="2" step="0.1" value="1">
        <span id="speedValue">1.0x</span>
        <input type="range" id="progressRange" min="0" max="100" value="0">
        <span id="currentTime">00:00</span> / <span id="duration">00:00</span>
      </div>
    </div>

    <!-- Translation history log (collapsible) -->
    <div class="log-container" id="logContainerParent">
      <div class="log-header">
        <div class="log-title">
          Translation History (Newest First)
          <span id="deviceIdDisplay" style="font-size: 0.8em; color: #888; margin-left: 10px; cursor: help;" title="Device ID"></span>
        </div>
        <div class="export-controls">
          <button class="export-btn" id="clearHistoryBtn" style="background-color: #dc3545;" onclick="clearDeviceHistory()">Clear History</button>
          <button class="export-btn" id="exportSelectedBtn">Export Selected</button>
          <button class="log-toggle-btn" id="toggleLogBtn">Show Log</button>
        </div>
      </div>
      <div id="logContainer" class="log-collapsed">
        <div class="select-all-container">
          <input type="checkbox" id="selectAllCheckbox">
          <label for="selectAllCheckbox">Select All</label>
        </div>
      </div>
    </div>
  </div>

  <!-- ======= Recording overlay ======= -->
  <div id="sttOverlay" class="overlay">
    <div class="overlay-content">
      <h3>Recording ...</h3>
      <!-- Real-time transcription text displayed here -->
      <textarea id="overlayTranscription" class="overlay-textarea" readonly></textarea>

      <button id="overlayStopBtn">Stop</button>
    </div>
  </div>

  <script>
    /*************************************************************
     * 1. Configuration: API endpoints for the local proxy server
     *************************************************************/
    // ============= Using local API proxy for security (keys stored on server) ============

    // API Proxy Base URL - 始终使用相对路径，避免跨域问题
    const API_PROXY_BASE = `/api-proxy`;

    // API endpoints
    const OPENAI_WHISPER_URL = `${API_PROXY_BASE}/api/openai/whisper`;
    const OPENAI_API_URL = `${API_PROXY_BASE}/api/openai/chat`;
    const OPENAI_TTS_URL = `${API_PROXY_BASE}/api/openai/tts`; // OpenAI TTS API
    // 本地LLM配置 (LM Studio OpenAI兼容API) — 用于翻译、语言检测、转写重组
    const LOCAL_LLM_URL = "/local-llm/v1/chat/completions";
    const LOCAL_LLM_MODEL = ""; // 留空则使用LM Studio当前加载的模型

    // Deepgram 实时STT配置
    const DEEPGRAM_API_KEY = ""; // Legacy direct Deepgram is disabled in the standalone repo; use server-side credentials only.
    const DEEPGRAM_MODEL = "nova-3";
    // Deepgram语言跟随mainLanguage动态切换（en/zh等）

    // FunASR 中文实时转写 (本地GPU，低延迟免费)
    const FUNASR_URL = "/funasr/transcribe";
    const FUNASR_CHUNK_MS = 3000; // 每3秒分段上传一次

    // Fish.audio TTS 配置 (中文效果优于ElevenLabs)
    const FISH_API_KEY = ""; // Legacy direct Fish.audio is disabled in the standalone repo; use server-side credentials only.
    const FISH_TTS_URL = "/fish-tts/v1/tts";
    const FISH_TTS_MODEL = "s2";
    const FISH_VOICE_ID = "e4642e5edccd4d9ab61a69e82d4f8a14";

    // Add OpenAI GPT-4o mini Transcribe API configuration
    const OPENAI_STREAM_TRANSCRIBE_URL = "https://api.openai.com/v1/audio/transcriptions";
    const OPENAI_STREAM_TRANSCRIBE_MODEL = "whisper-1"; // Use Whisper model for real-time transcription
    const MIN_PCM_DATA_SIZE_FOR_TRANSCRIPTION = 16000; // Reduce minimum data size for transcription, about 0.5 seconds each time
    let lastTranscribeTime = 0;
    const TRANSCRIBE_INTERVAL = 1000; // Reduce transcription interval to 1 second for more frequent transcription
    let streamTranscriptionInProgress = false;
    let transcribedText = "";
    let temporaryBuffer = [];
    let streamTranscribeTimeoutId = null;
    // Add automatic language detection flag
    let detectedLanguage = null;
    
    /*************************************************************
     * 2. Global variables & utility functions
     *************************************************************/
    let mainLanguage = "en";  // Default main language is English
    let targetLanguage = "zh"; // Default target language is Chinese
    let userHasManualMain = true;  // Mark as manually set
    let userHasManualTarget = true; // Mark as manually set

    // For requesting permission only once
    let micStream = null;      // Record user microphone stream
    let recognizer = null;     // Deepgram recognizer instance
    let mediaRecorder = null;  // Browser MediaRecorder
    let recordChunks = [];
    let isRecording = false;
    let recordStartTime = null;
    let recordTimer = null;
    let autoProcessTimer = null; // 自动处理音频数据的定时器

    // DOM缓存
    const recordBtn = document.getElementById("recordBtn");
    const inputText = document.getElementById("inputText");
    const translatedText = document.getElementById("outputText");
    const overlay = document.getElementById("sttOverlay");
    const overlayTranscription = document.getElementById("overlayTranscription");
    const overlayStopBtn = document.getElementById("overlayStopBtn");

    // BLE UUID 常量定义
    const voiceServiceUUID1 = '0000ffe0-0000-1000-8000-00805f9b34fb';
    const voiceServiceUUID2 = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const voiceDataCharacteristicUUID = '0000ffe1-0000-1000-8000-00805f9b34fb';

    // Bluetooth microphone related variables
    let bluetoothDevices = [null, null]; // Store two bluetooth devices
    let gattServers = [null, null];
    let voiceServices = [null, null];
    let voiceDataCharacteristics = [null, null];
    let functionModelCharacteristics = [null, null];
    let isBluetoothRecording = false;
    let isProcessingData = false;
    let isProcessingTimedOut = false; // Flag to prevent TTS after timeout
    let fullPcmDataArray = [];
    let lastDataReceivedTime = Date.now();
    const dataTimeout = 500; // ms
    let connectTrys = 0;
    let voiceServiceUUID = voiceServiceUUID1;
    let bleRecognizer = null;  // BLE recognizer handle (for push stream to BLE mic)
    let accumulatedText = "";  // Accumulated recognition text
    let currentPartialText = ""; // Current temporary text being recognized
    let checkDataTimeoutInterval = null; // Timer for checking data reception timeout
    let sttConnectionFailed = false; // Mark whether BLE recognizer connection failed
    let audioRetryCount = 0; // For recording audio initialization retry count
    const gmicMicBtn = document.getElementById("gmicMicBtn");
    const gmicMicBtn2 = document.getElementById("gmicMicBtn2");
    // Current active microphone index
    let activeMicIndex = -1;
    // Recording duration timer
    let bleRecordStartTime = null; // Bluetooth recording start time
    let bleRecordTimer = null;     // Bluetooth recording timer
    // Button signal
    let lastButtonSignal = -1; // Record last button signal, initial value -1 means unknown
    // Function model variables for physical button handling
    let lastOneTime = 0;
    const DOUBLE_CLICK_THRESHOLD = 500;
    let isDoubleClickDetected = false;
    // Add initialization status flag to prevent repeated initialization
    let isRecognizerInitializing = false; // Mark whether recognizer is initializing
    // Processing time record - no longer redeclared, use global variable
    // processingStartTime already declared in top script

    // Historical recording and TTS storage
    let audioHistory = []; // Array to store historical recordings and TTS
    let currentAudioBlob = null; // Current recording Blob
    let currentTTSBlob = null; // Current TTS Blob
    let isTTSSpeaking = false; // TTS 互斥锁，防止并发调用
    let ttsEnabled = false;    // TTS 开关，默认关闭
    let sessionTranslationTarget = null; // Current session translation target language
    let recognizerInitComplete = false; // Mark whether recognizer initialization is complete

    /*************************************************************
     * 设备ID管理和历史记录持久化
     * Device ID Management and History Persistence
     *************************************************************/
    const HISTORY_CONFIG = {
      storageKey: 'trans_history',        // localStorage key for history
      deviceIdKey: 'trans_device_id',     // localStorage key for device ID
      maxHistoryItems: 100,               // Maximum history items per device

    // Save user-set playback speed
    let savedPlaybackSpeed = 1.0; // Default speed is 1.0

    let dataSendCounter = 0;

    let initRecognizerTimeout = null;
    const MAX_RECOGNIZER_INIT_TIME = 5000; // Maximum time to wait for recognizer initialization (5 seconds)

    /*************************************************************
     * 分段处理配置 - 句子优先 + 时间兜底策略
     * Segment Processing Config - Sentence-first + Time-fallback
     *************************************************************/
    const SEGMENT_CONFIG = {
      // 句子触发：Deepgram recognized事件自动触发
      sentenceTrigger: true,

      // 软时间阈值：超过此时间 + 检测到停顿 → 触发分段

      // 硬时间上限：强制切分（避免单段过长）

      // 最小分段长度：避免过短的分段
      minSegmentLength: 5000,    // 5秒

      // 预处理并发数

    /*************************************************************
     * Streaming TTS Optimization - Core Classes
     * 流式句子级并行处理，目标延迟1-2秒
     *************************************************************/

    // Sentence status enum
    const SentenceStatus = {
      PENDING: 'pending',
      TRANSLATING: 'translating',
      TRANSLATED: 'translated',
      TTS_GENERATING: 'tts_generating',
      TTS_READY: 'tts_ready',
      PLAYING: 'playing',
      PLAYED: 'played',
      FAILED: 'failed'
    };

    // Sentence class
    class Sentence {
      constructor(id, text) {
        this.id = id;
        this.text = text;
        this.translatedText = '';
        this.status = SentenceStatus.PENDING;
        this.retryCount = 0;
        this.maxRetries = 2;
        this.audioBlob = null;
        this.audioUrl = null;
        this.createdAt = Date.now();
      }
    }

    // Sentence Queue Manager
    class SentenceQueueManager {
      constructor() {
        this.sentences = [];
        this.sentenceIdCounter = 0;
        this.maxConcurrentTranslations = 2;
        this.activeTranslations = 0;
        this.onSentenceReady = null; // callback when sentence is ready for TTS
        this.targetLanguage = null;
        this.processingStarted = false; // Only process after stop
      }

      reset() {
        this.sentences = [];
        this.sentenceIdCounter = 0;
        this.activeTranslations = 0;
        this.targetLanguage = null;
        this.processingStarted = false;
      }

      addSentence(text) {
        if (!text || !text.trim()) return null;
        const sentence = new Sentence(this.sentenceIdCounter++, text.trim());
        this.sentences.push(sentence);
        console.log(`[StreamingTTS] Sentence collected: #${sentence.id} "${text.substring(0, 30)}..."`);
        // Don't process immediately - wait for startProcessing() call
        return sentence;
      }

      // Called when user clicks Stop - start processing all collected sentences
      startProcessing() {
        if (this.processingStarted) return;
        this.processingStarted = true;
        console.log(`[StreamingTTS] Starting to process ${this.sentences.length} collected sentences`);
        this.processQueue();
      }

      async processQueue() {
        // Only process after startProcessing() is called (when user clicks Stop)
        if (!this.processingStarted) return;

        // Find pending sentences that can be translated
        const pendingSentences = this.sentences.filter(s =>
          s.status === SentenceStatus.PENDING &&
          this.activeTranslations < this.maxConcurrentTranslations
        );

        for (const sentence of pendingSentences) {
          if (this.activeTranslations >= this.maxConcurrentTranslations) break;
          this.translateSentence(sentence);
        }
      }

      async translateSentence(sentence) {
        if (!this.targetLanguage) {
          console.warn('[StreamingTTS] Target language not set, skipping translation');
          return;
        }

        sentence.status = SentenceStatus.TRANSLATING;
        this.activeTranslations++;
        console.log(`[StreamingTTS] Translating sentence #${sentence.id}`);

        try {
          const translated = await translateByChatGPT(sentence.text, this.targetLanguage);
          sentence.translatedText = translated;
          sentence.status = SentenceStatus.TRANSLATED;
          console.log(`[StreamingTTS] Sentence #${sentence.id} translated: "${translated.substring(0, 30)}..."`);

          // Notify TTS queue
          if (this.onSentenceReady) {
            this.onSentenceReady(sentence);
          }
        } catch (err) {
          console.error(`[StreamingTTS] Translation failed for sentence #${sentence.id}:`, err);
          sentence.retryCount++;
          if (sentence.retryCount < sentence.maxRetries) {
            sentence.status = SentenceStatus.PENDING;
            console.log(`[StreamingTTS] Retrying sentence #${sentence.id} (${sentence.retryCount}/${sentence.maxRetries})`);
          } else {
            sentence.status = SentenceStatus.FAILED;
            console.error(`[StreamingTTS] Sentence #${sentence.id} failed after ${sentence.maxRetries} retries`);
          }
        } finally {
          this.activeTranslations--;
          this.processQueue();
        }
      }

      getSentence(id) {
        return this.sentences.find(s => s.id === id);
      }

      getNextPlayableSentence() {
        return this.sentences.find(s => s.status === SentenceStatus.TTS_READY);
      }

      getAllTranslatedText() {
        return this.sentences
          .filter(s => s.translatedText)
          .map(s => s.translatedText)
          .join(' ');
      }

      getAllOriginalText() {
        return this.sentences
          .map(s => s.text)
          .join(' ');
      }
    }

    // TTS Queue Player - handles sequential playback
    class TTSQueuePlayer {
      constructor() {
        this.queue = [];
        this.isPlaying = false;
        this.currentSentence = null;
        this.preloadCount = 2;
        this.audioElement = null;
        this.onPlaybackComplete = null;
        this._playNextDepth = 0; // 递归深度守卫
      }

      init() {
        this.audioElement = document.getElementById("ttsAudio");
        this.setupEventListeners();
      }

      setupEventListeners() {
        if (!this.audioElement) return;

        this.audioElement.addEventListener("ended", () => {
          // 守卫：仅当音频由 TTSQueuePlayer 发起播放时才推进队列
          // currentSentence 为 null 说明是 speakTTS() 直接播放的音频，不应触发 playNext()
          if (!this.currentSentence) {
            console.log(`[StreamingTTS] Playback ended (non-queue audio), skipping playNext`);
            return;
          }
          console.log(`[StreamingTTS] Playback ended for sentence #${this.currentSentence?.id}`);
          this.currentSentence.status = SentenceStatus.PLAYED;
          // Clean up URL
          if (this.currentSentence.audioUrl) {
            URL.revokeObjectURL(this.currentSentence.audioUrl);
            this.currentSentence.audioUrl = null;
          }
          this.currentSentence = null;
          this.isPlaying = false;
          this.playNext();
        });

        this.audioElement.addEventListener("error", (e) => {
          console.error(`[StreamingTTS] Audio playback error:`, e);
          if (this.currentSentence) {
            this.currentSentence.status = SentenceStatus.FAILED;
          }
          this.currentSentence = null;
          this.isPlaying = false;
          this.playNext();
        });
      }

      async enqueueSentence(sentence) {
        console.log(`[StreamingTTS] Enqueuing sentence #${sentence.id} for TTS generation`);

        // Generate TTS
        try {
          sentence.status = SentenceStatus.TTS_GENERATING;
          const audioBlob = await this.generateTTS(sentence.translatedText);
          sentence.audioBlob = audioBlob;
          sentence.audioUrl = URL.createObjectURL(audioBlob);
          sentence.status = SentenceStatus.TTS_READY;
          this.queue.push(sentence);
          console.log(`[StreamingTTS] Sentence #${sentence.id} TTS ready, queue size: ${this.queue.length}`);

          // Auto-play if not playing
          if (!this.isPlaying) {
            this.playNext();
          }
        } catch (err) {
          console.error(`[StreamingTTS] TTS generation failed for sentence #${sentence.id}:`, err);
          sentence.status = SentenceStatus.FAILED;
        }
      }

      async generateTTS(text) {
        // Fish.audio TTS (中文效果优秀)
        try {
          const body = { text: text, format: "mp3" };
          if (FISH_VOICE_ID) body.reference_id = FISH_VOICE_ID;
          const resp = await fetch(FISH_TTS_URL, {
            method: "POST",
            headers: {
              "Authorization": `Bearer ${FISH_API_KEY}`,
              "Content-Type": "application/json",
              "model": FISH_TTS_MODEL
            },
            body: JSON.stringify(body)
          });
          if (resp.ok) {
            const audioData = await resp.arrayBuffer();
            return new Blob([audioData], { type: "audio/mpeg" });
          }
          throw new Error(`Fish.audio failed: ${resp.status}`);
        } catch (e1) {
          console.warn('[StreamingTTS] Fish.audio failed, trying OpenAI:', e1.message);
          // 回退到 OpenAI TTS
          try {
            const resp = await fetch(OPENAI_TTS_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text: text, voice: "shimmer" })
            });
            if (resp.ok) {
              const audioData = await resp.arrayBuffer();
              return new Blob([audioData], { type: "audio/mp3" });
            }
            throw new Error(`OpenAI failed: ${resp.status}`);
          } catch (e2) {
            console.error('[StreamingTTS] All TTS failed:', e2.message);
            throw new Error(`All TTS services failed`);
          }
        }
      }

      playNext() {
        if (this.isPlaying || this.queue.length === 0) return;

        // 递归深度守卫：防止空/无效 sentence 导致无限递归
        this._playNextDepth++;
        if (this._playNextDepth > 10) {
          console.warn('[StreamingTTS] playNext() recursion depth exceeded, aborting');
          this._playNextDepth = 0;
          return;
        }

        const sentence = this.queue.shift();
        if (!sentence || !sentence.audioUrl) {
          this.playNext();
          return;
        }
        // 成功找到有效 sentence，重置深度计数
        this._playNextDepth = 0;

        console.log(`[StreamingTTS] Playing sentence #${sentence.id}`);
        this.currentSentence = sentence;
        this.currentSentence.status = SentenceStatus.PLAYING;
        this.isPlaying = true;

        this.audioElement.src = sentence.audioUrl;
        this.audioElement.load();
        this.audioElement.playbackRate = savedPlaybackSpeed;
        this.audioElement.play().catch(err => {
          console.error('[StreamingTTS] Play failed:', err);
          this.isPlaying = false;
          this.currentSentence = null;
          this.playNext();
        });

        document.getElementById("playPauseBtn").textContent = "Pause";
      }

      stop() {
        console.log('[StreamingTTS] Stopping TTS player');
        if (this.audioElement && !this.audioElement.paused) {
          this.audioElement.pause();
          this.audioElement.currentTime = 0;
        }

        // Clean up all queued audio URLs
        for (const sentence of this.queue) {
          if (sentence.audioUrl) {
            URL.revokeObjectURL(sentence.audioUrl);
          }
        }

        this.queue = [];
        this.isPlaying = false;
        this.currentSentence = null;
        document.getElementById("playPauseBtn").textContent = "Play";
      }

      get queueLength() {
        return this.queue.length;
      }
    }

    // Streaming Translation Controller - orchestrates the entire flow
    class StreamingTranslationController {
      constructor() {
        this.queueManager = new SentenceQueueManager();
        this.ttsPlayer = new TTSQueuePlayer();
        this.isActive = false;
        this.sessionHandledTTS = false;  // Flag to indicate this session's TTS is handled by streaming
        this.detectedLanguage = null;
        this.sessionStartTime = null;

        // Wire up the pipeline
        this.queueManager.onSentenceReady = (sentence) => {
          this.ttsPlayer.enqueueSentence(sentence);
          this.updateUIWithTranslation();
        };
      }

      init() {
        this.ttsPlayer.init();
      }

      async startSession() {
        console.log('[StreamingTTS] Starting streaming session');
        this.isActive = true;
        this.sessionHandledTTS = false;  // Reset for new session
        this.sessionStartTime = Date.now();
        this.queueManager.reset();
        this.detectedLanguage = null;

        // Determine target language from current settings
        this.queueManager.targetLanguage = targetLanguage || (mainLanguage === 'zh' ? 'en' : 'zh');
        console.log(`[StreamingTTS] Session target language: ${this.queueManager.targetLanguage}`);
      }

      async onSentenceRecognized(text) {
        if (!this.isActive || !text || !text.trim()) return;

        console.log(`[StreamingTTS] Received recognized sentence: "${text.substring(0, 50)}..."`);

        // Detect language from first sentence if not set
        if (!this.detectedLanguage && text.length > 3) {
          try {
            const detected = await detectLanguageByChatGPT(text);
            this.detectedLanguage = normalizeLang(detected);
            console.log(`[StreamingTTS] Detected language: ${this.detectedLanguage}`);

            // Update target language based on detection
            if (this.detectedLanguage === mainLanguage) {
              this.queueManager.targetLanguage = targetLanguage;
            } else {
              this.queueManager.targetLanguage = mainLanguage;
            }
          } catch (e) {
            console.warn('[StreamingTTS] Language detection failed:', e);
          }
        }

        // Add to queue for processing
        this.queueManager.addSentence(text);
      }

      updateUIWithTranslation() {
        // Update translation text area with all translated text so far
        const allTranslated = this.queueManager.getAllTranslatedText();
        if (allTranslated) {
          document.getElementById("outputText").value = allTranslated;
        }
      }

      endSession() {
        console.log('[StreamingTTS] Ending streaming session');
        this.isActive = false;

        // Mark that this session's TTS is handled by streaming (if there are sentences)
        if (this.queueManager.sentences.length > 0) {
          this.sessionHandledTTS = true;
          console.log(`[StreamingTTS] Session will handle TTS for ${this.queueManager.sentences.length} sentences`);
        }

        // Start processing all collected sentences when user clicks Stop
        this.queueManager.startProcessing();

        // Note: Let the TTS queue continue playing remaining sentences
      }

      stop() {
        console.log('[StreamingTTS] Force stopping streaming session');
        this.isActive = false;
        this.ttsPlayer.stop();
        this.queueManager.reset();
      }

      getStats() {
        return {
          isActive: this.isActive,
          totalSentences: this.queueManager.sentences.length,
          queuedForTTS: this.ttsPlayer.queueLength,
          sessionDuration: this.sessionStartTime ? Date.now() - this.sessionStartTime : 0
        };
      }
    }

    /*************************************************************
     * SegmentProcessor - 分段处理器
     * 实现句子优先+时间兜底的分段处理策略
     *************************************************************/
    class SegmentProcessor {
      constructor() {
        this.segments = [];           // 已处理的分段
        this.pendingSegments = [];    // 待处理的分段队列
        this.currentSegmentStart = 0; // 当前分段开始时间
        this.lastSentenceTime = 0;    // 上次句子结束时间
        this.segmentIdCounter = 0;
        this.isProcessing = false;
        this.recordingStartTime = null;
        this.audioChunks = [];        // 当前分段的音频块
        this.allAudioChunks = [];     // 所有音频块（用于最终完整处理）
        this.hardTimerHandle = null;  // 硬时间限制定时器
        this.activeProcessingCount = 0;

        // 回调函数
        this.onSegmentReady = null;   // 分段TTS准备好时的回调
        this.onAllComplete = null;    // 所有处理完成时的回调
      }

      reset() {
        this.segments = [];
        this.pendingSegments = [];
        this.currentSegmentStart = 0;
        this.lastSentenceTime = 0;
        this.segmentIdCounter = 0;
        this.isProcessing = false;
        this.recordingStartTime = null;
        this.audioChunks = [];
        this.allAudioChunks = [];
        this.activeProcessingCount = 0;
        if (this.hardTimerHandle) {
          clearTimeout(this.hardTimerHandle);
          this.hardTimerHandle = null;
        }
      }

      // 开始新的录音会话
      startSession() {
        this.reset();
        this.recordingStartTime = Date.now();
        this.currentSegmentStart = Date.now();
        console.log('[SegmentProcessor] 开始新会话');
        this.startHardTimer();
      }

      // 启动硬时间限制定时器
      startHardTimer() {
        if (this.hardTimerHandle) {
          clearTimeout(this.hardTimerHandle);
        }

      // 硬时间限制触发
      onHardTimeLimit() {
        const elapsed = Date.now() - this.currentSegmentStart;
        if (elapsed >= SEGMENT_CONFIG.hardTimeLimit) {
          console.log(`[SegmentProcessor] 硬时间限制触发 (${elapsed}ms)`);
          this.triggerSegment('hard_time_limit');

      // 添加音频数据块
      addAudioChunk(chunk) {
        this.audioChunks.push(chunk);
        this.allAudioChunks.push(chunk);

      // 句子结束事件（由Deepgram recognized触发）
      onSentenceEnd(text) {
        if (!SEGMENT_CONFIG.enabled || !SEGMENT_CONFIG.sentenceTrigger) return;

        const now = Date.now();
        const segmentDuration = now - this.currentSegmentStart;
        this.lastSentenceTime = now;

        console.log(`[SegmentProcessor] 句子结束: "${text.substring(0, 30)}..." (分段时长: ${segmentDuration}ms)`);

        // 检查是否满足最小分段长度
        if (segmentDuration >= SEGMENT_CONFIG.minSegmentLength) {
          this.triggerSegment('sentence_end', text);
        } else {
          console.log(`[SegmentProcessor] 分段过短 (${segmentDuration}ms < ${SEGMENT_CONFIG.minSegmentLength}ms), 继续累积`);
        }
      }

      // 检查软时间阈值（需要配合停顿检测）
      checkSoftTimeThreshold(hasPause = false) {
        if (!SEGMENT_CONFIG.enabled) return;

        const elapsed = Date.now() - this.currentSegmentStart;

        if (elapsed >= SEGMENT_CONFIG.softTimeThreshold && hasPause) {
          console.log(`[SegmentProcessor] 软时间阈值触发 (${elapsed}ms + 停顿)`);
          this.triggerSegment('soft_time_threshold');
        }
      }

      // 触发分段处理
      async triggerSegment(reason, text = '') {
        if (this.audioChunks.length === 0) {
          console.log('[SegmentProcessor] 无音频数据，跳过分段');
          return;
        }

        const segmentId = this.segmentIdCounter++;
        const segmentDuration = Date.now() - this.currentSegmentStart;

        // 创建分段对象
        const segment = {
          id: segmentId,
          reason: reason,
          text: text,
          audioChunks: [...this.audioChunks],
          duration: segmentDuration,
          status: 'pending',
          translatedText: '',
          ttsBlob: null,
          ttsUrl: null,
          createdAt: Date.now()
        };

        this.segments.push(segment);
        this.pendingSegments.push(segment);

        console.log(`[SegmentProcessor] 创建分段 #${segmentId} (原因: ${reason}, 时长: ${segmentDuration}ms)`);

        // 重置当前分段
        this.audioChunks = [];
        this.currentSegmentStart = Date.now();
        this.startHardTimer();

        // 开始后台处理
        this.processNextSegment();
      }

      // 处理下一个待处理分段
      async processNextSegment() {
        if (this.activeProcessingCount >= SEGMENT_CONFIG.maxConcurrentProcessing) {
          return;
        }

        const segment = this.pendingSegments.shift();
        if (!segment) return;

        this.activeProcessingCount++;
        segment.status = 'processing';
        console.log(`[SegmentProcessor] 开始处理分段 #${segment.id}`);

        try {
          // 1. 合并音频块并转为Blob
          const audioBlob = await this.createAudioBlob(segment.audioChunks);

          // 2. 发送到Whisper转写
          console.log(`[SegmentProcessor] 分段 #${segment.id} 发送到Whisper`);
          const whisperText = await this.transcribeWithWhisper(audioBlob);
          segment.text = whisperText || segment.text;
          console.log(`[SegmentProcessor] 分段 #${segment.id} Whisper结果: "${segment.text.substring(0, 50)}..."`);

          // 3. 检测语言并翻译
          if (segment.text) {
            const targetLang = await this.determineTargetLanguage(segment.text);
            if (targetLang) {
              console.log(`[SegmentProcessor] 分段 #${segment.id} 翻译到: ${targetLang}`);
              segment.translatedText = await translateByChatGPT(segment.text, targetLang);
              console.log(`[SegmentProcessor] 分段 #${segment.id} 翻译结果: "${segment.translatedText.substring(0, 50)}..."`);
            } else {
              segment.translatedText = segment.text;
            }
          }

          // 4. 生成TTS
          if (segment.translatedText) {
            console.log(`[SegmentProcessor] 分段 #${segment.id} 生成TTS`);
            segment.ttsBlob = await this.generateTTS(segment.translatedText);
            segment.ttsUrl = URL.createObjectURL(segment.ttsBlob);
            segment.status = 'ready';
            console.log(`[SegmentProcessor] 分段 #${segment.id} TTS准备完成`);

            // 通知TTS准备好
            if (this.onSegmentReady) {
              this.onSegmentReady(segment);
            }
          }
        } catch (err) {
          console.error(`[SegmentProcessor] 分段 #${segment.id} 处理失败:`, err);
          segment.status = 'failed';
          segment.error = err.message;
        } finally {
          this.activeProcessingCount--;
          // 继续处理下一个
          this.processNextSegment();
        }
      }

      // 创建音频Blob
      async createAudioBlob(chunks) {
        // 如果是PCM数据，需要转换为WAV格式
        const pcmData = new Int16Array(chunks.flat());
        const wavBuffer = this.pcmToWav(pcmData, 16000);
        return new Blob([wavBuffer], { type: 'audio/wav' });
      }

      // PCM转WAV格式
      pcmToWav(pcmData, sampleRate) {
        const numChannels = 1;
        const bytesPerSample = 2;
        const dataLength = pcmData.length * bytesPerSample;
        const buffer = new ArrayBuffer(44 + dataLength);
        const view = new DataView(buffer);

        // WAV header
        const writeString = (offset, string) => {
          for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
          }
        };

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + dataLength, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * numChannels * bytesPerSample, true);
        view.setUint16(32, numChannels * bytesPerSample, true);
        view.setUint16(34, bytesPerSample * 8, true);
        writeString(36, 'data');
        view.setUint32(40, dataLength, true);

        // Write PCM data
        const offset = 44;
        for (let i = 0; i < pcmData.length; i++) {
          view.setInt16(offset + i * 2, pcmData[i], true);
        }

        return buffer;
      }

      // Whisper转写
      async transcribeWithWhisper(audioBlob) {
        const base64Audio = await this.blobToBase64(audioBlob);

        const resp = await fetch(OPENAI_WHISPER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            audio: base64Audio,
            model: "whisper-1"
          })
        });

        if (!resp.ok) {
          throw new Error(`Whisper request failed: ${resp.status}`);
        }

        const data = await resp.json();
        return data.text?.trim() || '';
      }

      // Blob转Base64
      blobToBase64(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const base64 = reader.result.split(',')[1];
            resolve(base64);
          };
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      }

      // 停止录音时调用 - 处理剩余数据并返回准备好的分段

    function initSegmentProcessor() {

    // ADPCM decoding table - copied from index.html
    const idxtbl = [-1, -1, -1, -1, 2, 4, 6, 8, -1, -1, -1, -1, 2, 4, 6, 8];
    const steptbl = [
      7, 8, 9, 10, 11, 12, 13, 14, 16,17,19,21,23,25,28,31,
      34,37,41,45,50,55,60,66,73,80,88,97,107,118,130,143,
      157,173,190,209,230,253,279,307,337,371,408,449,494,544,
      598,658,724,796,876,963,1060,1166,1282,1411,1552,1707,1878,2066,
      2272,2499,2749,3024,3327,3660,4026,4428,4871,5358,5894,6484,7132,7845,8630,9493,
      10442,11487,12635,13899,15289,16818,18500,20350,22385,24623,27086,29794,32767
    ];

    // ADPCM decoding function - copied from index.html
    function adpcmToPcm(ps, pd) {
      let sampleCount = ps[3] * 2;
      let predict = (ps[0] | (ps[1]<<8))<<16>>16;
      let predict_idx = ps[2];

      let pcode = ps.slice(4);
      let code = pcode.shift();

      for (let i=0; i<sampleCount; i++) {
        let step = steptbl[predict_idx];
        let diffq = step >> 3;
        if (code & 4) diffq += step;
        step >>=1;
        if (code & 2) diffq += step;
        step >>=1;
        if (code & 1) diffq += step;

        if (code & 8) predict -= diffq;
        else predict += diffq;

        if (predict>32767) predict=32767; else if (predict<-32768) predict=-32768;
        predict_idx += idxtbl[code & 15];
        if (predict_idx<0) predict_idx=0; else if (predict_idx>88) predict_idx=88;

        if (i & 1) {
          code = pcode.shift();
        } else {
          code >>=4;
        }
        pd.push(predict & 0xFF);
        pd.push((predict >>8) & 0xFF);
      }
    }

    // PCM to WAV - copied from index.html
    function pcmToWav(pcmData, sampleRate = 16000) {
      const dataSize = pcmData.length;
      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);

      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + dataSize, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, 'data');
      view.setUint32(40, dataSize, true);

      let offset = 44;
      for (let i = 0; i < dataSize; i += 2) {
        const sample = (pcmData[i+1] << 8) | pcmData[i];
        view.setInt16(offset, sample, true);
        offset += 2;
      }

      return new Blob([buffer], { type: 'audio/wav' });
    }

    function writeString(dv, offset, str) {
      for (let i=0; i<str.length; i++) {
        dv.setUint8(offset+i, str.charCodeAt(i));
      }
    }

    // New fast translation function specifically for real-time transcription
    // Deepgram固定英文输入 → 直接翻译到中文，跳过语言检测以降低延迟
    function performRealTimeTranslation(text) {
      if (!text.trim() || text === lastTranslatedText || translating) {
        return;
      }

      // Cancel previous debounce timer
      if (translationDebounceTimer) {
        clearTimeout(translationDebounceTimer);
      }

      // Use shorter delay for real-time translation
      translationDebounceTimer = setTimeout(async () => {
        translating = true;
        try {

          const actualTargetLang = targetLanguage;

          // Translate text via local LLM

          // Update translation result
          translatedText.value = translated;
          lastTranslatedText = text;

        } catch (err) {
          console.error("Translation error:", err);
        } finally {
          translating = false;
        }
      }, 300);  // 300ms防抖 — 平衡实时性和本地LLM负载
    }

    async function debouncedTranslate(text, forcedTargetLang = null) {
      if (translationDebounceTimer) {
        clearTimeout(translationDebounceTimer);
      }

      // If text is same as last translation, skip
      if (text === lastTranslatedText) {
        return;
      }

      translationDebounceTimer = setTimeout(async () => {
        if (!text.trim() || translating) return;
        
        translating = true;
        try {
          // Detect language
          const detectedRaw = await detectLanguageByChatGPT(text);
          const detectedLang = normalizeLang(detectedRaw);
          
          // Determine target language
          let actualTargetLang = forcedTargetLang;
          if (!actualTargetLang) {
            // When no target language specified, follow OpenAI logic
            actualTargetLang = detectedLang === 'en' ? 'zh' : 'en';
          }

          const translated = await translateByChatGPT(text, actualTargetLang);
          
          // Update display: original text on left, translation on right
          translatedText.value = translated;
          lastTranslatedText = text;
          
          console.log(`Translation complete: ${detectedLang} => ${actualTargetLang}`);
        } catch (err) {
          console.error("Translation error:", err);
        } finally {
          translating = false;
        }
      }, 800);  // 800ms delay
    }

                processingStartTime = Date.now();

                  // 物理按钮回合制：一次性提交给Whisper处理
                  processPcmData(true).then(() => {
                    // 确保状态被重置
                    isProcessingData = false;
                    micBtn.classList.add('waiting');
                    micBtn.innerHTML = `<i class="fas fa-microphone"></i> GMIC ${micIndex+1} Ready`;
                  }).catch((e) => {
                    console.error(`[物理按钮] 处理PCM数据时出错:`, e);
                    inputText.value = "处理失败: " + e.message;
                    // 确保状态被重置
                    isProcessingData = false;
                    micBtn.classList.add('waiting');
                    micBtn.innerHTML = `<i class="fas fa-microphone"></i> GMIC ${micIndex+1} Ready`;
                  });
                } catch (e) {
                  console.error(`[物理按钮] 处理PCM数据时出错:`, e);
                  inputText.value = "处理失败: " + e.message;
                  // 确保状态被重置
                  isProcessingData = false;
                  micBtn.classList.add('waiting');
                  micBtn.innerHTML = `<i class="fas fa-microphone"></i> GMIC ${micIndex+1} Ready`;
                }
              } else {
                // Too little data, reset status
                resetRecordingState(false);
                micBtn.classList.add('waiting');
                micBtn.innerHTML = `<i class="fas fa-microphone"></i> GMIC ${micIndex+1} Ready`;
                inputText.value = "录音时间太短，请重试";
              }
            } else {
            }
          }
          
          return;
        }
        
        // Only process voice data from current active microphone
        if (activeMicIndex !== micIndex && activeMicIndex !== -1 && isBluetoothRecording) {
          console.log(`Ignoring voice data from non-active microphone ${micIndex+1}`);
          return;
        }
        
        // 如果未在录音状态，忽略数据（录音现在由物理按钮控制）
        if (!isBluetoothRecording) {
          // 静默忽略，不打印日志以减少噪音
          return;
        }
        
        // Update last data reception time
        lastDataReceivedTime = Date.now();

        // Decode ADPCM data to PCM
        try {
          const decodedData = decodeADPCM(adpcmData);

          // Add decoded PCM data to array (for fallback and final processing)
          const array = new Uint8Array(decodedData.buffer);
          for (let i = 0; i < array.length; i++) {
            fullPcmDataArray.push(array[i]);
          }

          // 将PCM数据添加到分段处理器
          if (SEGMENT_CONFIG.enabled && segmentProcessor) {
            segmentProcessor.addAudioChunk(Array.from(decodedData));
          }

        } catch (error) {
          console.error(`Failed to decode microphone ${micIndex+1} ADPCM data:`, error);
        }
      } catch (error) {
        console.error("Error in main function handling voice data:", error);
      }
    }

    function checkDataTimeout() {
      // If already processing data, don't perform any operations
      if (isProcessingData) {
        return;
      }
      
      const now = Date.now();
      if (now - lastDataReceivedTime > dataTimeout && !isProcessingData && isBluetoothRecording) {
        
        
        // Turn-based: immediately stop recording status
        isBluetoothRecording = false;
        
        // Immediately stop recording timer
        stopRecordingTimers();
        
        // Clear stream transcription timer
        if (streamTranscribeTimeoutId) {
          clearTimeout(streamTranscribeTimeoutId);
          streamTranscribeTimeoutId = null;
        }
        
        // Update UI to processing status
        const activeMicBtn = activeMicIndex === 0 ? gmicMicBtn : gmicMicBtn2;
        activeMicBtn.classList.remove('recording');
        activeMicBtn.innerHTML = '<i class="fas fa-cog fa-spin"></i> Processing...';
        
        if (fullPcmDataArray.length > 1000) {
          
          isProcessingData = true; // Set status first, then process data
          processPcmData(false); // false means not triggered by signal
        } else {
          // Too little data, don't process
          
          resetRecordingState(false); // false means don't clear input
          activeMicBtn.classList.add('waiting');
          activeMicBtn.innerHTML = `<i class="fas fa-microphone"></i> GMIC ${activeMicIndex+1} Ready`;
        }
      }
    }

    async function processPcmData(isSignalTriggered = false) {

      // Double check to ensure no duplicate processing
      if (!isProcessingData) {
        console.log("[数据处理] processPcmData被调用但isProcessingData为false，中止处理");
        return;
      }
      
      console.log("[数据处理] 正在处理音频数据...");
      
      // Set processing timeout to prevent processing from hanging
      if (processingTimeoutId) {
        clearTimeout(processingTimeoutId);
      }
      processingTimeoutId = setTimeout(() => {
        console.error(`[数据处理] 数据处理超时 (${MAX_PROCESSING_TIME}ms)，强制重置状态`);
        // Stop current TTS playback to prevent audio conflicts
        stopCurrentTTS();
        console.log("[数据处理] 已停止当前TTS播放以避免音频冲突");
        // Set timeout flag to prevent subsequent TTS playback
        isProcessingTimedOut = true;
        console.log("[数据处理] 已设置超时标志，阻止后续TTS播放");
        // If processing times out, force status reset
        isProcessingData = false;
        resetRecordingState(false);
        const activeMicBtn = activeMicIndex === 0 ? gmicMicBtn : gmicMicBtn2;
        activeMicBtn.classList.remove('recording');
        activeMicBtn.classList.add('waiting');
        activeMicBtn.innerHTML = `<i class="fas fa-microphone"></i> GMIC Ready`;
      }, MAX_PROCESSING_TIME);
      
      try {
        // Convert PCM data to WAV format

        let audioBlob = pcmToWav(fullPcmDataArray, 16000);

        // Save current recording to add to history record
        currentAudioBlob = audioBlob;

        const activeMicBtn = activeMicIndex === 0 ? gmicMicBtn : gmicMicBtn2;

        // 检查分段处理器是否已有处理结果
        const segmentProcessorActive = SEGMENT_CONFIG.enabled && segmentProcessor &&
          (segmentProcessor.segments.length > 0 || segmentProcessor.pendingSegments.length > 0);

        if (segmentProcessorActive) {
          // ============= 分段处理模式 =============
          console.log("[数据处理] 使用分段处理模式");
          activeMicBtn.innerHTML = '<i class="fas fa-cog fa-spin"></i> Finishing...';

          // 结束分段处理器会话，处理剩余数据
          const segments = await segmentProcessor.finishSession();

          // 获取所有原文和译文
          const allOriginalText = segments.map(s => s.text).filter(t => t).join(' ');
          const allTranslatedText = segments.map(s => s.translatedText).filter(t => t).join(' ');

          // 更新输入框和输出框
          if (allOriginalText) {
            inputText.value = allOriginalText;
            inputText.style.color = "#000";
          }
          if (allTranslatedText) {
            translatedText.value = allTranslatedText;
          }

          // 添加到历史记录
          if (allOriginalText || allTranslatedText) {
            appendLog(allOriginalText, allTranslatedText, currentAudioBlob, null);
          }

          console.log(`[数据处理] 分段处理完成: ${segments.length} 个分段`);
          // TTS已由分段处理器回调处理，无需再次播放

        } else {
          // ============= 原有turn-based模式 =============
          console.log("[数据处理] 使用turn-based模式");

          // Turn-based: clear input box, show processing status
          inputText.value = "Transcribing...";
          translatedText.value = ""; // Clear translation result
          activeMicBtn.innerHTML = '<i class="fas fa-cog fa-spin"></i> Transcribing...';

          // 如果是物理按钮触发的结束录音，进行完整转写而不是流式转写
          if (isSignalTriggered) {
            console.log("[数据处理] 物理按钮触发的录音结束 - 执行完整转写");
            // 停止流式转写
            if (streamTranscribeTimeoutId) {
              clearTimeout(streamTranscribeTimeoutId);
              streamTranscribeTimeoutId = null;
              console.log("[数据处理] 已停止流式转写定时器");
            }
          } else {
            console.log("[数据处理] 非物理按钮触发的处理");
          }

          // Turn-based: send to Whisper at once for complete recognition
          // 注意：sendToWhisper() 内部通过 handleInput() 已完成翻译 + TTS 播放，
          // 此处不再重复调用 TTS，避免同一段翻译被播放两次
          console.log("[数据处理] 开始发送到Whisper进行完整识别");
          await sendToWhisper(audioBlob);
        }

        console.log("Audio processing complete");
      } catch (error) {
        console.error("Error processing audio data:", error);
      } finally {
        // Clear processing timeout
        if (processingTimeoutId) {
          clearTimeout(processingTimeoutId);
        }
        
        
        // Ensure processing status is reset
        isProcessingData = false;
        // Reset timeout flag for next recording
        isProcessingTimedOut = false;
        console.log("[数据处理] 已重置超时标志，准备下次录音");
        
        // Reset recording status, but don't clear input text
        resetRecordingState(false);
        
        // Use the new function to reset specific microphone UI
        if (activeMicIndex >= 0) {
          resetMicrophoneUI(activeMicIndex, "数据处理完成");
        }

        
      }
    }

      // 如果当前没有录音或者正在处理数据，则不执行
      if (!isBluetoothRecording || isProcessingData) {

      // 如果数据量不足，则不执行
      if (fullPcmDataArray.length < 1000) {

      if (streamTranscribeTimeoutId) {
        clearTimeout(streamTranscribeTimeoutId);
      }
      
      streamTranscribeTimeoutId = setTimeout(() => {
        // 调用现有的流式转写函数
        streamTranscribe();
      }, 100);
    }

      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const min = String(d.getMinutes()).padStart(2, "0");
      const sec = String(d.getSeconds()).padStart(2, "0");

    // Stop current TTS playback
    function stopCurrentTTS() {
      // Force stop streaming controller if active
      if (streamingController) {
        streamingController.stop();
        console.log("[TTS] 流式控制器已强制停止");
      }

      const audioElement = document.getElementById("ttsAudio");
      if (audioElement) {
        // 暂停音频播放
        if (!audioElement.paused) {
          audioElement.pause();
        }
        // 重置播放位置
        audioElement.currentTime = 0;
        // 清理当前音频源和URL
        if (audioElement.src && audioElement.src.startsWith('blob:')) {
          URL.revokeObjectURL(audioElement.src);
        }
        audioElement.src = '';
        // 重置播放按钮状态
        document.getElementById("playPauseBtn").textContent = "Play";
      }
    }

    function normalizeLang(lang) {
      if (!lang) return null;
      let l = lang.toLowerCase();
      if (l.startsWith("zh")) return "zh";
      if (l.startsWith("en")) return "en";
      if (l.startsWith("fr")) return "fr";
      if (l.startsWith("es")) return "es";
      return l;
    }

    }
