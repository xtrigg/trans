    // Get microphone stream
    async function getMicStream() {
      // If stream already exists, return directly
      if (micStream) {
        return micStream;
      }

      try {
        // Request user microphone
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
        micStream = stream;
        return stream;
      } catch (err) {
        console.error("Failed to get microphone:", err);
        throw err;
      }
    }

    // Initialize Deepgram recognizer - computer microphone version
    async function initDeepgramRecognizer() {
      if (!DEEPGRAM_API_KEY || DEEPGRAM_API_KEY === "YOUR_DEEPGRAM_API_KEY") {
        console.error("[Deepgram] API Key未配置");
        updateSTTDebugStatus("Deepgram API Key未配置", 'error');
        return null;
      }

      try {
        console.log("[Deepgram] 初始化实时识别器...");

        // 获取麦克风
        const stream = await getMicStream();
        console.log("[Deepgram] 麦克风已获取");

        // 构建 Deepgram WebSocket URL
        // Deepgram语言代码映射：zh → zh-CN（Deepgram要求带区域码）
        const dgLang = mainLanguage === 'zh' ? 'zh-CN' : mainLanguage;
        console.log(`[Deepgram] STT语言跟随ML: ${mainLanguage} → ${dgLang}`);
        const dgUrl = `wss://api.deepgram.com/v1/listen?model=${DEEPGRAM_MODEL}&language=${dgLang}&smart_format=true&interim_results=true&utterance_end_ms=1500&vad_events=true&encoding=linear16&sample_rate=16000&channels=1`;

        // 创建 AudioContext 将麦克风音频转为 PCM16
        const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        const source = audioContext.createMediaStreamSource(stream);
        const processor = audioContext.createScriptProcessor(4096, 1, 1);

        let dgSocket = null;
        let socketReady = false;

        // 创建 WebSocket 连接到 Deepgram
        dgSocket = new WebSocket(dgUrl, ["token", DEEPGRAM_API_KEY]);

        dgSocket.onopen = () => {
          console.log("[Deepgram] ✅ WebSocket连接已建立");
          updateSTTDebugStatus("Deepgram real-time connection established", 'success');
          socketReady = true;

          // 清除文本状态
          accumulatedText = "";
          currentPartialText = "";
          lastTranslatedText = "";
          inputText.value = "";
          translatedText.value = "";
          if (translationDebounceTimer) {
            clearTimeout(translationDebounceTimer);
          }
        };

        dgSocket.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);

            if (data.type === "Results") {
              const transcript = data.channel?.alternatives?.[0]?.transcript || "";
              if (!transcript) return;

              if (data.is_final) {
                // 最终结果 — 累积到文本
                console.log("[Deepgram] 最终识别: " + transcript);
                accumulatedText += (accumulatedText ? " " : "") + transcript;
                currentPartialText = "";
                inputText.value = accumulatedText;

                // 实时翻译（只更新文字，不触发TTS）
                performRealTimeTranslation(accumulatedText);

              } else {
                // 临时结果 — 实时显示
                currentPartialText = transcript;
                const fullText = accumulatedText +
                  (accumulatedText && currentPartialText ? " " : "") +
                  currentPartialText;
                inputText.value = fullText;

                // 实时翻译（随着更多文字到来不断更新）
                performRealTimeTranslation(fullText);
              }
            } else if (data.type === "UtteranceEnd") {
              console.log("[Deepgram] 语句结束");
            } else if (data.type === "SpeechStarted") {
              console.log("[Deepgram] 检测到语音开始");
            }
          } catch (err) {
            console.error("[Deepgram] 解析消息失败:", err);
          }
        };

        dgSocket.onerror = (err) => {
          console.error("[Deepgram] WebSocket错误:", err);
          updateSTTDebugStatus("Deepgram connection error", 'error');
        };

        dgSocket.onclose = (event) => {
          console.log(`[Deepgram] WebSocket关闭: code=${event.code}, reason=${event.reason}`);
          socketReady = false;
          updateSTTDebugStatus("Deepgram disconnected", 'warning');
        };

        // 音频处理：将浮点PCM转为Int16并发送到Deepgram
        processor.onaudioprocess = (e) => {
          if (!socketReady || dgSocket.readyState !== WebSocket.OPEN) return;
          const inputData = e.inputBuffer.getChannelData(0);
          const pcm16 = new Int16Array(inputData.length);
          for (let i = 0; i < inputData.length; i++) {
            const s = Math.max(-1, Math.min(1, inputData[i]));
            pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
          }
          dgSocket.send(pcm16.buffer);
        };

        // 连接音频管道
        source.connect(processor);
        // 静音输出：ScriptProcessorNode 需要连接到 destination 才能触发 onaudioprocess
        // 但不能输出到扬声器（否则形成反馈回路），所以用 gain=0 静音
        const silentGain = audioContext.createGain();
        silentGain.gain.value = 0;
        processor.connect(silentGain);
        silentGain.connect(audioContext.destination);

        // KeepAlive 定时器
        const keepAliveInterval = setInterval(() => {
          if (dgSocket && dgSocket.readyState === WebSocket.OPEN) {
            dgSocket.send(JSON.stringify({ type: "KeepAlive" }));
          }
        }, 8000);

        // 返回识别器接口对象
        const rec = {
          _dgSocket: dgSocket,
          _audioContext: audioContext,
          _processor: processor,
          _source: source,
          _keepAliveInterval: keepAliveInterval,

          startContinuousRecognitionAsync: function(successCb, errorCb) {
            // Deepgram在WebSocket连接时就已开始，只需确认
            if (socketReady) {
              console.log("[Deepgram] 实时识别已启动");
              if (successCb) successCb();
            } else {
              // 等待连接就绪
              const checkReady = setInterval(() => {
                if (socketReady) {
                  clearInterval(checkReady);
                  console.log("[Deepgram] 实时识别已启动 (等待后)");
                  if (successCb) successCb();
                } else if (dgSocket.readyState === WebSocket.CLOSED || dgSocket.readyState === WebSocket.CLOSING) {
                  clearInterval(checkReady);
                  if (errorCb) errorCb("Deepgram WebSocket connection failed");
                }
              }, 100);
              // 5秒超时
              setTimeout(() => {
                if (!socketReady) {
                  if (errorCb) errorCb("Deepgram connection timeout");
                }
              }, 5000);
            }
          },

          stopContinuousRecognitionAsync: function(successCb, errorCb) {
            try {
              console.log("[Deepgram] 停止实时识别");
              clearInterval(keepAliveInterval);

              // 断开音频管道
              try { processor.disconnect(); } catch(e) {}
              try { source.disconnect(); } catch(e) {}
              try { audioContext.close(); } catch(e) {}

              // 关闭WebSocket
              if (dgSocket && dgSocket.readyState === WebSocket.OPEN) {
                dgSocket.close();
              }
              if (successCb) successCb();
            } catch (err) {
              console.error("[Deepgram] 停止失败:", err);
              if (errorCb) errorCb(err);
            }
          }
        };

        return rec;
      } catch (err) {
        console.error("[Deepgram] 初始化失败:", err);
        return null;
      }
    }

    // Initialize FunASR recognizer - WebSocket流式中文转写 (ML=ZH时使用)
    // 浏览器通过 AudioContext 采集 PCM16 → WebSocket → FunASR GPU转写 → 返回文本
    async function initFunASRRecognizer() {
      try {
        console.log("[FunASR-WS] 初始化中文WebSocket流式转写...");
        updateSTTDebugStatus("FunASR: connecting WebSocket", 'info');

        // 获取麦克风
        const stream = await getMicStream();
        console.log("[FunASR-WS] 麦克风已获取");

        // 构建 WebSocket URL（通过 nginx WSS 代理）
        const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProto}//${location.host}/funasr-ws/stream`;
        console.log("[FunASR-WS] 连接:", wsUrl);

        const funSocket = new WebSocket(wsUrl);
        let socketReady = false;

        // 清除文本状态
        accumulatedText = "";
        currentPartialText = "";
        lastTranslatedText = "";
        inputText.value = "";
        translatedText.value = "";
        if (translationDebounceTimer) clearTimeout(translationDebounceTimer);

        // AudioContext: 采集PCM16并发送到WebSocket
        const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        const source = audioContext.createMediaStreamSource(stream);
        const processor = audioContext.createScriptProcessor(4096, 1, 1);

        processor.onaudioprocess = (e) => {
          if (!socketReady || funSocket.readyState !== WebSocket.OPEN) return;
          const inputData = e.inputBuffer.getChannelData(0);
          const pcm16 = new Int16Array(inputData.length);
          for (let i = 0; i < inputData.length; i++) {
            const s = Math.max(-1, Math.min(1, inputData[i]));
            pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
          }
          funSocket.send(pcm16.buffer);
        };

        source.connect(processor);
        // 静音输出：ScriptProcessorNode 需要连接到 destination 才能触发 onaudioprocess
        // 但不能输出到扬声器（否则形成反馈回路），所以用 gain=0 静音
        const silentGain = audioContext.createGain();
        silentGain.gain.value = 0;
        processor.connect(silentGain);
        silentGain.connect(audioContext.destination);

        // WebSocket 事件处理
        funSocket.onopen = () => {
          console.log("[FunASR-WS] WebSocket已连接");
          socketReady = true;
          updateSTTDebugStatus("FunASR: Chinese real-time STT active", 'success');
        };

        funSocket.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);

            if (data.type === "partial") {
              // 每个分段的转写结果
              console.log("[FunASR-WS] 分段:", data.text);
              accumulatedText = data.accumulated || (accumulatedText + data.text);
              inputText.value = accumulatedText;

              // 实时翻译（只更新文字，不触发TTS）
              performRealTimeTranslation(accumulatedText);
            } else if (data.type === "final") {
              console.log("[FunASR-WS] 最终结果:", data.text);
              accumulatedText = data.text;
              inputText.value = accumulatedText;
              performRealTimeTranslation(accumulatedText);
            } else if (data.type === "error") {
              console.error("[FunASR-WS] 服务端错误:", data.text);
              updateSTTDebugStatus("FunASR error: " + data.text, 'error');
            }
          } catch (err) {
            console.error("[FunASR-WS] 解析消息失败:", err);
          }
        };

        funSocket.onerror = (err) => {
          console.error("[FunASR-WS] WebSocket错误:", err);
          updateSTTDebugStatus("FunASR connection error", 'error');
        };

        funSocket.onclose = () => {
          console.log("[FunASR-WS] WebSocket关闭");
          socketReady = false;
        };

        // 返回兼容的识别器接口
        const rec = {
          startContinuousRecognitionAsync: function(successCb, errorCb) {
            if (socketReady) {
              console.log("[FunASR-WS] 中文流式转写已启动");
              if (successCb) successCb();
            } else {
              const check = setInterval(() => {
                if (socketReady) {
                  clearInterval(check);
                  if (successCb) successCb();
                } else if (funSocket.readyState === WebSocket.CLOSED) {
                  clearInterval(check);
                  if (errorCb) errorCb("FunASR WebSocket failed");
                }
              }, 100);
              setTimeout(() => { if (!socketReady && errorCb) errorCb("FunASR connection timeout"); }, 5000);
            }
          },
          stopContinuousRecognitionAsync: function(successCb, errorCb) {
            try {
              console.log("[FunASR-WS] 停止中文流式转写");
              // 断开音频管道
              try { processor.disconnect(); } catch(e) {}
              try { source.disconnect(); } catch(e) {}
              try { audioContext.close(); } catch(e) {}
              // 发送stop信号并关闭WebSocket
              if (funSocket.readyState === WebSocket.OPEN) {
                funSocket.send(JSON.stringify({ type: "stop" }));
                // 等一小段时间让final结果返回
                setTimeout(() => { try { funSocket.close(); } catch(e) {} }, 500);
              }
              // 停止麦克风
              stream.getTracks().forEach(t => t.stop());
              if (successCb) successCb();
            } catch (err) {
              console.error("[FunASR-WS] 停止失败:", err);
              if (errorCb) errorCb(err);
            }
          }
        };

        return rec;
      } catch (err) {
        console.error("[FunASR-WS] 初始化失败:", err);
        return null;
      }
    }

    /*************************************************************
     * 3. Turn-based translation main process handleInput
     *************************************************************/
    async function handleInput(userText, isCompleteTranscription = false) {
      if (!userText) return;
      const detectedRaw = await detectLanguageByChatGPT(userText);
      const detectedLang = normalizeLang(detectedRaw) || "unknown";

      let translationTarget = null;
      if (!mainLanguage) {
        // First time
        if (!userHasManualMain) {
          mainLanguage = detectedLang;
        }
        if (mainLanguage === "zh") {
          if (!userHasManualTarget) {
            targetLanguage = "en";
          }
        } else {
          if (!userHasManualTarget) {
            targetLanguage = "zh";
          }
        }
        translationTarget = targetLanguage;
      } else {
        // Subsequent conversations
        if (detectedLang !== mainLanguage) {
          // User's language != main language => translate to main language
          translationTarget = mainLanguage;
          // Dynamically update targetLanguage to use as the language for next translation back
          if (!userHasManualTarget) {
            targetLanguage = detectedLang;
          }
        } else {
          // User's language = main language => translate to targetLanguage (if different from main)
          if (targetLanguage && targetLanguage !== mainLanguage) {
            translationTarget = targetLanguage;
          } else {
            translationTarget = null;
          }
        }
      }
      updateStatusUI();

      // Store current session's translation target language for TTS generation
      sessionTranslationTarget = translationTarget;

      // If target language = detected language => self-translation (skip)
      if (translationTarget && translationTarget === detectedLang) {
        document.getElementById("outputText").value = userText;
        appendLog(userText, userText, currentAudioBlob, null);
        return;
      }

      // Perform translation
      let translated = userText;
      if (translationTarget) {
        translated = await translateByChatGPT(userText, translationTarget);
      }

      document.getElementById("outputText").value = translated;

      // Play with TTS (only if not timed out)
      // 简化逻辑：在分段处理禁用时，直接播放TTS
      // 只有在分段处理启用且有分段时才跳过（由分段处理器负责TTS）
      const segmentHandledTTS = SEGMENT_CONFIG.enabled && segmentProcessor &&
        segmentProcessor.segments.length > 0;

      if (translated && !isProcessingTimedOut && !segmentHandledTTS) {
        await speakTextByTTS(translated, translationTarget || "en");
        // Add to history record, including audio Blob
        appendLog(userText, translated, currentAudioBlob, currentTTSBlob);
        // Reset current session's audio Blob
        currentAudioBlob = null;
        currentTTSBlob = null;
      } else {
        // Still add to history record when no TTS (or segment handled it)
        appendLog(userText, translated, currentAudioBlob, segmentHandledTTS ? null : currentTTSBlob);
        currentAudioBlob = null;
        if (!segmentHandledTTS) currentTTSBlob = null;
      }
      
      // 如果是完整转写结果的翻译，更新麦克风按钮状态
      if (isCompleteTranscription) {
        // 更新麦克风按钮状态为就绪
        const activeMicBtn = activeMicIndex === 0 ? gmicMicBtn : gmicMicBtn2;
        activeMicBtn.innerHTML = '<i class="fas fa-microphone"></i>';
        activeMicBtn.classList.remove('recording');
        
        // 确保录音状态变量被重置
        isBluetoothRecording = false;
        isRecording = false;
      }
    }

    // Language detection (ChatGPT)
    // 通用本地LLM调用函数
    async function callLocalLLM(messages, temperature = 0) {
      const body = {
        messages: messages,
        temperature: temperature
      };
      if (LOCAL_LLM_MODEL) {
        body.model = LOCAL_LLM_MODEL;
      }
      const resp = await fetch(LOCAL_LLM_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (!resp.ok) {
        throw new Error(`Local LLM error: ${resp.status} ${resp.statusText}`);
      }
      const data = await resp.json();
      return (data.choices && data.choices[0].message.content.trim()) || "";
    }

    async function detectLanguageByChatGPT(text) {
      // 使用本地LLM检测语言
      try {
        const msgs = [
          {
            role: "system",
            content: "You are a language detection tool. Analyze the text and return ONLY the language code of the dominant language (the language with most characters). Return only the short code like 'zh', 'en', 'fr', 'es', 'ko', etc. No explanation."
          },
          { role: "user", content: text }
        ];
        const result = await callLocalLLM(msgs, 0);
        return result || "unknown";
      } catch (err) {
        console.error("detectLanguage fail:", err);
        return "unknown";
      }
    }

    // Translation (ChatGPT)
    async function translateByChatGPT(text, targetLang) {
      if (!targetLang) return text;
      const msgs = [
        {
          role: "system",
          content:
            "You are a professional translator. Translate the ENTIRE input text to " + targetLang + " language, regardless of the original languages used. Keep proper nouns, addresses, and numbers as is. Maintain the original format and line breaks. Output only the final translation."
        },
        { role: "user", content: text }
      ];
      try {
        return await callLocalLLM(msgs, 0);
      } catch (err) {
        console.error("translate fail:", err);
        return "";
      }
    }

    // 综合Deepgram和Whisper转写结果 (ChatGPT)
    async function combineTranscriptionsWithChatGPT(deepgramText, whisperText) {

      // 如果只有一个结果，直接返回
      if (!deepgramText || deepgramText.trim() === "") {

        return whisperText;
      }
      if (!whisperText || whisperText.trim() === "") {

        return deepgramText;
      }

      // 使用ChatGPT综合两份转写结果
      const msgs = [
        {
          role: "system",
          content: `You are a professional transcription editor. You will receive two transcriptions of the same audio:
1. Deepgram real-time transcription (may have some errors due to real-time processing)
2. Whisper complete transcription (generally more accurate)

Your task is to:
- Combine the strengths of both transcriptions
- Correct any obvious errors
- Output the most accurate and natural transcription
- Keep the original language
- Output ONLY the final transcription text, NO explanations

If both transcriptions are very similar, prefer the Whisper version as it's usually more accurate.`
        },
        {
          role: "user",
          content: `Deepgram transcription: ${deepgramText}

Whisper transcription: ${whisperText}

Please provide the best combined transcription:`
        }
      ];

      try {
        const combinedText = await callLocalLLM(msgs, 0.3);
        return combinedText || whisperText;
      } catch (err) {
        console.error("[综合转写] 本地LLM综合失败:", err);
        // 如果综合失败，返回Whisper结果作为后备
        return whisperText;
      }
    }

    /*************************************************************
     * 4. TTS (Fish.audio -> OpenAI fallback)
     *************************************************************/

    // 通用TTS播放辅助函数
    function playTTSBlob(blob) {
      currentTTSBlob = blob;
      const audioUrl = URL.createObjectURL(blob);
      const audioElement = document.getElementById("ttsAudio");
      setTimeout(() => {
        audioElement.src = audioUrl;
        audioElement.load();
        audioElement.playbackRate = savedPlaybackSpeed;
        audioElement.play().catch(err => console.error("[TTS] play failed:", err));
      }, 100);
      document.getElementById("playPauseBtn").textContent = "Pause";
    }

    async function speakTextByTTS(text, lang) {
      // 过滤空文本和错误文本
      if (!text || !text.trim() || text.startsWith("[") || text.startsWith("Error:")) {
        console.log('[TTS] 跳过无效文本:', text?.substring(0, 50));
        return;
      }

      // 互斥锁
      if (isTTSSpeaking) {
        console.log('[TTS] 检测到并发调用，先停止当前播放');
        const audioEl = document.getElementById("ttsAudio");
        if (audioEl && !audioEl.paused) { audioEl.pause(); audioEl.currentTime = 0; }
      }
      isTTSSpeaking = true;

      try {
        // 第一优先级：Fish.audio TTS (中英文效果都好)
        console.log(`[TTS] Fish.audio, lang=${lang}, voice=${FISH_VOICE_ID}`);

        const body = { text: text, format: "mp3" };
        if (FISH_VOICE_ID) body.reference_id = FISH_VOICE_ID;

        const resp = await fetch(FISH_TTS_URL, {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${FISH_API_KEY}`,
            "Content-Type": "application/json",
            "model": FISH_TTS_MODEL
          },
          body: JSON.stringify(body)
        });

        if (!resp.ok) throw new Error(`Fish.audio TTS: ${resp.status} ${resp.statusText}`);

        const audioData = await resp.arrayBuffer();
        playTTSBlob(new Blob([audioData], { type: "audio/mpeg" }));
        console.log("[TTS] Fish.audio complete");

      } catch (fishErr) {
        console.warn("[TTS] Fish.audio failed:", fishErr);

        // 第二优先级：OpenAI TTS 回退
        try {
          console.log("[TTS] Fallback to OpenAI TTS...");
          const resp = await fetch(OPENAI_TTS_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: text, voice: "shimmer" })
          });
          if (!resp.ok) throw new Error("OpenAI TTS: " + resp.statusText);

          const audioData = await resp.arrayBuffer();
          playTTSBlob(new Blob([audioData], { type: "audio/mp3" }));
          console.log("[TTS] OpenAI TTS complete");
        } catch (openaiErr) {
          console.error("[TTS] All TTS failed:", openaiErr);
        }
      } finally {
        setTimeout(() => { isTTSSpeaking = false; }, 200);
      }
    }

    /*************************************************************
     * 5. 播放器控制
     *************************************************************/
    const audioElement = document.getElementById("ttsAudio");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const speedRange = document.getElementById("speedRange");
    const speedValue = document.getElementById("speedValue");
    const progressRange = document.getElementById("progressRange");
    const currentTimeSpan = document.getElementById("currentTime");
    const durationSpan = document.getElementById("duration");

    playPauseBtn.addEventListener("click", () => {
      if (audioElement.paused) {
        audioElement.play();
        playPauseBtn.textContent = "Pause";
      } else {
        audioElement.pause();
        playPauseBtn.textContent = "Play";
      }
    });

    speedRange.addEventListener("input", () => {
      const speed = parseFloat(speedRange.value);
      audioElement.playbackRate = speed;
      speedValue.textContent = speed.toFixed(1) + "x";
      
      // 保存用户设置的播放速度
      savedPlaybackSpeed = speed;
      localStorage.setItem('savedPlaybackSpeed', speed); // 持久化保存
    });

    audioElement.addEventListener("timeupdate", () => {
      if (audioElement.duration) {
        const progress = (audioElement.currentTime / audioElement.duration) * 100;
        progressRange.value = progress;
        currentTimeSpan.textContent = formatTime(audioElement.currentTime);
        durationSpan.textContent = formatTime(audioElement.duration);
      }
    });

    audioElement.addEventListener("loadedmetadata", () => {
      // 音频加载完成后应用保存的播放速度
      audioElement.playbackRate = savedPlaybackSpeed;
    });

    // 统一处理音频播放结束事件
    audioElement.addEventListener("ended", () => {
      // 释放 TTS 互斥锁
      isTTSSpeaking = false;
      // 重置播放按钮状态
      document.getElementById("playPauseBtn").textContent = "Play";
      // 清理当前音频URL（如果存在）
      if (audioElement.src && audioElement.src.startsWith('blob:')) {
        URL.revokeObjectURL(audioElement.src);
      }
    });

    progressRange.addEventListener("input", () => {
      if (audioElement.duration) {
        const seekTime = (progressRange.value / 100) * audioElement.duration;
        audioElement.currentTime = seekTime;
      }
    });

    /*************************************************************
     * 6. Deepgram STT Real-time Transcription + OpenAI Whisper Complete Audio
     *************************************************************/
    async function startRecording() {
      // 停止当前TTS播放
      stopCurrentTTS();

      // 清空上一轮文本
      accumulatedText = "";
      currentPartialText = "";
      lastTranslatedText = "";
      inputText.value = "";
      translatedText.value = "";

      // 更新按钮状态
      recordBtn.innerHTML = '<i class="fas fa-microphone"></i> Recording...';

      // 根据ML选择STT引擎：EN→Deepgram, ZH→FunASR
      if (mainLanguage === 'zh') {
        console.log("[STT] ML=ZH -> FunASR WebSocket");
        recognizer = await initFunASRRecognizer();
      } else {
        console.log("[STT] ML=EN -> Deepgram WebSocket");
        recognizer = await initDeepgramRecognizer();
      }

      if (recognizer) {
        recognizer.startContinuousRecognitionAsync(
          () => console.log("[STT] 实时识别已启动"),
          (err) => {
            console.error("[STT] 启动失败:", err);
            recognizer = null;
            recordBtn.innerHTML = '<i class="fas fa-microphone"></i> Record';
          }
        );

        // UI计时器
        isRecording = true;
        recordStartTime = Date.now();
        recordTimer = setInterval(() => {
          const elapsed = Math.floor((Date.now() - recordStartTime) / 1000);
          const mm = String(Math.floor(elapsed / 60)).padStart(2, "0");
          const ss = String(elapsed % 60).padStart(2, "0");
          recordBtn.innerHTML = '<i class="fas fa-stop"></i> Stop (' + mm + ":" + ss + ")";
        }, 500);
      } else {
        console.error("[STT] 初始化失败");
        recordBtn.innerHTML = '<i class="fas fa-microphone"></i> Record';
      }
    }

    // Helper function to start Whisper-based recording
    function startWhisperRecording() {
      getMicStream().then(stream => {
        recordChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) {
            recordChunks.push(e.data);
          }
        };
        mediaRecorder.onstop = async () => {
          console.log("[mediaRecorder] onstop事件触发");

    async function sendToWhisper(blob) {
      console.log("[Whisper转写] 开始Whisper转写");

      try {
        // 将Blob转换为base64格式，通过API代理发送
        console.log("[Whisper转写] 开始转换音频为base64格式");
        const base64Audio = await blobToBase64(blob);

        // 添加超时控制（60秒）
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 60000);

        const resp = await fetch(OPENAI_WHISPER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            audio: base64Audio,
            model: "whisper-1"
          }),
          signal: controller.signal
        });

        clearTimeout(timeoutId);

        if (!resp.ok) {
          console.error(`[Whisper转写] 请求失败: ${resp.status} ${resp.statusText}`);
          throw new Error("Whisper request failed: " + resp.statusText);
        }

        console.log("[Whisper转写] 请求成功，解析响应数据");
        const data = await resp.json();
        const whisperText = data.text.trim();

        // 保存Deepgram实时识别的累积结果（在清除之前）
        const deepgramText = transcribedText || "";

        // 清除实时转写结果
        streamTranscriptionResult = "";
        console.log("[Whisper转写] 已清除实时转写结果");

        // 使用ChatGPT综合Deepgram和Whisper的转写结果
        let finalTranscription = whisperText;
        if (deepgramText.trim() !== "") {
          console.log("[综合转写] 检测到Deepgram结果，开始综合");
          try {
            finalTranscription = await combineTranscriptionsWithChatGPT(deepgramText, whisperText);

          } catch (err) {
            console.error("[综合转写] 综合过程出错，使用Whisper结果:", err);
            finalTranscription = whisperText;
          }
        } else {
          console.log("[综合转写] 没有Deepgram结果，直接使用Whisper结果");
        }

        // 清除Deepgram实时识别的累积文本（在综合之后）
        transcribedText = "";
        accumulatedText = "";
        currentPartialText = "";
        console.log("[Whisper转写] 已清除Deepgram实时识别累积文本");

        // Turn-based: 使用综合后的最终转写结果
        inputText.value = finalTranscription;
        inputText.style.color = "#000"; // 恢复为黑色，表示最终结果
        console.log("[Whisper转写] 已更新输入框内容为综合结果");

        // 更新UI状态为翻译中 - 区分系统麦克风和蓝牙麦克风

        // Turn-based: Perform translation (language detection + translation + TTS, etc.)
        if (finalTranscription) {
          console.log("[Whisper转写] 开始处理综合转写结果（翻译等）");

    // 辅助函数：将Blob转换为base64
    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => {
          // 移除数据URL的前缀（例如："data:audio/wav;base64,"）
          const base64 = reader.result.split(',')[1];
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    };

    // Function to calculate audio duration
    async function getAudioDuration(blob) {
      return new Promise((resolve) => {
        const tempAudio = new Audio();
        tempAudio.addEventListener('loadedmetadata', () => {
          resolve(tempAudio.duration);
        });
        
        // If loading fails or cannot get duration, return unknown
        tempAudio.addEventListener('error', () => {
          resolve(null);
        });
        
        tempAudio.src = URL.createObjectURL(blob);
      });
    }

    // Format duration display
    function formatDuration(seconds) {
      if (!seconds && seconds !== 0) return '';
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `(${min}:${sec.toString().padStart(2, '0')})`;
    }

    // New function: Stream transcription processing - using OpenAI API
    async function streamTranscribe() {
      // If already transcribing or insufficient data, exit
      if (streamTranscriptionInProgress || fullPcmDataArray.length < MIN_PCM_DATA_SIZE_FOR_TRANSCRIPTION) {
        return;
      }
      
      // Prevent repeated calls in short time
      const now = Date.now();
      if (now - lastTranscribeTime < TRANSCRIBE_INTERVAL) {
        return;
      }
      
      try {
        streamTranscriptionInProgress = true;
        lastTranscribeTime = now;
        
        // Show transcribing status
        const activeMicBtn = activeMicIndex === 0 ? gmicMicBtn : gmicMicBtn2;
        const currentText = activeMicBtn.innerHTML;
        if (!currentText.includes("Transcribing")) {
          activeMicBtn.innerHTML = currentText.replace("Recording", "Recording (Transcribing)");
        }
        
        // Create copy of temporary audio data to avoid data growth during processing
        const tempPcmData = new Uint8Array(fullPcmDataArray);
        
        // Convert PCM data to WAV format
        const audioBlob = pcmToWav(tempPcmData, 16000);
        
        // 将Blob转换为base64
        const base64Audio = await blobToBase64(audioBlob);
        
        // 准备请求参数
        const requestData = {
          audio: base64Audio,
          model: OPENAI_STREAM_TRANSCRIBE_MODEL
        };
        
        // 如果语言已被检测，使用它来提高精度
        if (detectedLanguage) {
          requestData.language = detectedLanguage;
        }
        
        // 在输入框中显示"Transcribing..."指示器
        if (!inputText.value) {
          inputText.value = "Transcribing...";
        } else if (!inputText.value.endsWith("...")) {
          // 避免重复添加"..."
          const typingIndicator = document.createElement("span");
          typingIndicator.id = "typing-indicator";
          typingIndicator.textContent = "...";
          inputText.value = inputText.value.replace(/\.\.\.$/g, "") + "...";
        }
        
        // 使用API代理发送请求
        const response = await fetch(OPENAI_WHISPER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(requestData)
        });
        
        if (!response.ok) {
          throw new Error(`OpenAI transcription API returned error: ${response.status} ${response.statusText}`);
        }
        
        const result = await response.json();
        
        if (result && result.text) {
          // Get new transcription text
          const newText = result.text.trim();
          
          // If there's new content, update transcription text
          if (newText && newText !== transcribedText) {
            // When recording time exceeds 3 seconds, to avoid phrase repetition, replace old with new complete transcription
            if (Date.now() - bleRecordStartTime > 3000) {
              transcribedText = newText;
            } 
            // Early in recording, try to preserve existing content and incrementally add
            else if (newText.length > transcribedText.length) {
              transcribedText = newText;
            }
            
            // If language not detected, try to detect from results
            if (!detectedLanguage && transcribedText.length > 5) {
              try {
                detectedLanguage = await detectLanguageByChatGPT(transcribedText);
                console.log("Detected language:", detectedLanguage);
              } catch (e) {
                console.error("Language detection failed:", e);
              }
            }
            
            // Display text in input box
            inputText.value = transcribedText;
            
            // Only trigger immediate translation for first transcription to avoid frequent translation
            if (!window.hasFirstTranscription) {
              performRealTimeTranslation(transcribedText);
              window.hasFirstTranscription = true;
            } else {
              // If not first time, use debounced function for translation
              debouncedTranslate(transcribedText);
            }
            
            console.log("Stream transcription update:", transcribedText);
          }
        }
        
        // Restore button status
        if (activeMicBtn.innerHTML.includes("Transcribing")) {
          const elapsed = Math.floor((Date.now() - bleRecordStartTime) / 1000);
          const mm = String(Math.floor(elapsed / 60)).padStart(2, "0");
          const ss = String(elapsed % 60).padStart(2, "0");
          activeMicBtn.innerHTML = `<i class="fas fa-microphone"></i> GMIC ${activeMicIndex+1} Recording (${mm}:${ss})`;
        }
      } catch (error) {
        console.error("Stream transcription error:", error);
        // Also update input box when error occurs to avoid always showing "Transcribing..."
        if (inputText.value === "Transcribing...") {
          inputText.value = "";
        }
      } finally {
        streamTranscriptionInProgress = false;
      }
    }

    async function doConnect(currentUUID, micIndex) {
      try {
        console.log(`Connecting to GATT (Mic ${micIndex+1})...`);
        
        // Ensure device exists and is not connected
        if (!bluetoothDevices[micIndex]) {
          throw new Error("Device not initialized");
        }
        
        // Establish GATT connection
        gattServers[micIndex] = await bluetoothDevices[micIndex].gatt.connect();
        console.log(`Connected to GATT server (Mic ${micIndex+1})`);

        // Wait for device to stabilize after connection
        console.log(`Waiting for device ${micIndex+1} to stabilize...`);
        await new Promise(resolve => setTimeout(resolve, 500));

        // Verify connection is still active
        if (!bluetoothDevices[micIndex] || !gattServers[micIndex] || !gattServers[micIndex].connected) {
          throw new Error("Device disconnected immediately after connection");
        }
        console.log(`Device ${micIndex+1} connection stable, proceeding to service setup`);

        // Try to set up services, including multiple UUID failover
        const alternativeUUIDs = [
          '0000181c-0000-1000-8000-00805f9b34fb',  // Currently used UUID
          '00001853-0000-1000-8000-00805f9b34fb',  // Backup UUID
          '0000ffe0-0000-1000-8000-00805f9b34fb',  // Originally defined UUID1
          '6e400001-b5a3-f393-e0a9-e50e24dcca9e'   // Originally defined UUID2
        ];
        
        let lastError = null;
        let success = false;
        
        for (let i = 0; i < alternativeUUIDs.length && !success; i++) {
          // Check if device is still valid before trying UUID
          // (Device may disconnect and be set to null during previous attempt)
          if (!bluetoothDevices[micIndex]) {
            console.warn(`Device ${micIndex+1} became null during connection attempt, aborting UUID retry loop`);
            throw new Error("Device disconnected during setup");
          }

          const uuid = alternativeUUIDs[i];
          try {
            console.log(`Trying UUID ${i+1}/${alternativeUUIDs.length}: ${uuid}`);
            await setupServices(uuid, micIndex);
            success = true;
            console.log(`UUID ${uuid} connection successful!`);
          } catch(e) {
            console.warn(`UUID ${uuid} failed:`, e.message);
            lastError = e;

            // Check again if device is still valid before waiting
            if (!bluetoothDevices[micIndex]) {
              console.warn(`Device ${micIndex+1} disconnected, stopping UUID attempts`);
              break;
            }

            if (i < alternativeUUIDs.length - 1) {
              console.log(`Waiting 1 second before trying next UUID...`);
              await new Promise(resolve => setTimeout(resolve, 1000));
            }
          }
        }
        
        if (!success) {
          console.error(`All UUIDs failed, last error:`, lastError);
          throw lastError || new Error("All service UUID connections failed");
        }
      } catch (error) {
        console.error(`GATT connection failed (Mic ${micIndex+1}):`, error);
        
        // If error is GATT server disconnect, try to reconnect
        if (error.message.includes("GATT Server is disconnected")) {
          // Try to reconnect up to 3 times
          if (connectTrys < 3) {
            connectTrys++;
            console.log(`Attempting to reconnect (attempt ${connectTrys}/3)...`);
            
            // Wait 1 second before retrying
            await new Promise(resolve => setTimeout(resolve, 1000));
            return await doConnect(currentUUID, micIndex);
          }
        }
        throw error;
      }
    }

    async function setupServices(uuid, micIndex) {
      // Use timeout mechanism to avoid infinite waiting
      const setupTimeout = new Promise((_, reject) => {
        setTimeout(() => reject(new Error(`Service setup timeout (30 seconds)`)), 30000);
      });
      
      const setupPromise = (async () => {
        try {
          // Check if device is still available
          if (!bluetoothDevices[micIndex]) {
            throw new Error("Bluetooth device is null, cannot connect");
          }

          // Check if GATT server is connected
          if (!gattServers[micIndex] || !gattServers[micIndex].connected) {
            console.log("GATT server not connected, reconnecting...");
            gattServers[micIndex] = await bluetoothDevices[micIndex].gatt.connect();
          }
          
          console.log(`Attempting to find service (Mic ${micIndex+1}): ${uuid}`);
          console.log(`Waiting to get primary service...`);
          
          // Add timeout protection
          const servicePromise = gattServers[micIndex].getPrimaryService(uuid);
          const serviceTimeout = new Promise((_, reject) => {
            setTimeout(() => reject(new Error(`Get service timeout: ${uuid}`)), 5000); // Reduced to 5 seconds
          });
          
          voiceServices[micIndex] = await Promise.race([servicePromise, serviceTimeout]);
          console.log(`Found voice service (Mic ${micIndex+1}): ${uuid}`);
          
          // Use determined characteristic UUID
          const characteristicUUID = '00002bcd-0000-1000-8000-00805f9b34fb';
          console.log(`Attempting to find characteristic (Mic ${micIndex+1}): ${characteristicUUID}`);
          
          voiceDataCharacteristics[micIndex] = await voiceServices[micIndex].getCharacteristic(characteristicUUID);
          console.log(`Found voice data characteristic (Mic ${micIndex+1})`);
          
          // Add event listener and start notifications
          await voiceDataCharacteristics[micIndex].startNotifications();
          voiceDataCharacteristics[micIndex].addEventListener('characteristicvaluechanged', event => handleVoiceData(event));
          console.log(`Started notifications successfully (Mic ${micIndex+1})`);
          
          // 添加functionModelCharacteristic用于处理物理按钮信号
          try {
            const functionModelUUID = '00002b7a-0000-1000-8000-00805f9b34fb';
            if (!functionModelCharacteristics) {
              functionModelCharacteristics = [];
            }
            
            functionModelCharacteristics[micIndex] = await voiceServices[micIndex].getCharacteristic(functionModelUUID);
            await functionModelCharacteristics[micIndex].startNotifications();
            functionModelCharacteristics[micIndex].addEventListener('characteristicvaluechanged', event => handleFunctionModel(event, micIndex));
          } catch (error) {
            console.warn(`[物理按钮] 无法设置functionModel特征值 (Mic ${micIndex+1}):`, error);
            // 不抛出错误，因为有些设备可能不支持此特征值
          }
          
          // Enter waiting state after successful connection
          const micBtn = micIndex === 0 ? gmicMicBtn : gmicMicBtn2;
          micBtn.classList.remove('connecting');
          micBtn.classList.add('waiting');
          micBtn.innerHTML = `<i class="fas fa-microphone"></i> GMIC ${micIndex+1} Ready`;
        } catch (error) {
          console.error(`Failed to set up services (Mic ${micIndex+1}):`, error);
          throw error;
        }
      })();
      
      // Use Promise.race to implement timeout
      await Promise.race([setupPromise, setupTimeout]);
    }

    // Handle bluetooth disconnection
    function handleDisconnection(micIndex) {
      if (activeMicIndex === micIndex) {

        isBluetoothRecording = false;
        isProcessingData = false; // Ensure processing status is reset
      }
      
      const micBtn = micIndex === 0 ? gmicMicBtn : gmicMicBtn2;

      micBtn.classList.remove('connecting', 'waiting', 'recording', 'connected');
      micBtn.innerHTML = `<i class="fas fa-bluetooth"></i> GMIC-MIC0${micIndex+1}`;
      
      resetBluetoothVariables(micIndex);
      // Try to auto-reconnect 5 seconds after disconnection
      setTimeout(() => {
        // Only try auto-reconnect if user hasn't manually reconnected
        if (!isBluetoothDeviceConnected(micIndex)) {
          console.log(`Attempting to auto-reconnect device ${micIndex+1}...`);
          // Don't directly call connectGMICMic here as it will pop up device selection dialog
          // Instead, if device reference still exists, try to reconnect directly
          if (bluetoothDevices[micIndex]) {
            tryReconnect(micIndex);
          }
        }
      }, 5000);
    }
    
    // New: Function to try reconnecting device
    async function tryReconnect(micIndex) {
      const micBtn = micIndex === 0 ? gmicMicBtn : gmicMicBtn2;
      micBtn.classList.add('connecting');
      micBtn.innerHTML = `<i class="fas fa-sync fa-spin"></i> Reconnecting...`;
      
      try {
        if (bluetoothDevices[micIndex]) {
          console.log(`Attempting to reconnect device ${micIndex+1}`);
          gattServers[micIndex] = await bluetoothDevices[micIndex].gatt.connect();
          console.log(`Reconnection successful, setting up services (Mic ${micIndex+1})`);
          
          // Re-setup services
          await setupServices(voiceServiceUUID, micIndex);
          
          console.log(`Device ${micIndex+1} reconnection successful`);
          micBtn.classList.remove('connecting');
          micBtn.classList.add('connected');
          micBtn.innerHTML = `<i class="fas fa-bluetooth"></i> Reconnected ${micIndex+1}`;
        } else {
          throw new Error("Device reference lost, cannot reconnect");
        }
      } catch (error) {
        console.error(`Reconnection failed (Mic ${micIndex+1}):`, error);
        micBtn.classList.remove('connecting', 'connected');
        micBtn.innerHTML = `<i class="fas fa-bluetooth"></i> GMIC-MIC0${micIndex+1}`;
      }
    }
    
    // Safe check if bluetooth device is connected
    function isBluetoothDeviceConnected(micIndex) {
      try {
        return bluetoothDevices[micIndex] &&
               bluetoothDevices[micIndex].gatt &&
               bluetoothDevices[micIndex].gatt.connected;
      } catch (e) {
        console.warn(`Error checking bluetooth connection (Mic ${micIndex+1}):`, e);
        return false;
      }
    }

    // Reset bluetooth variables
    function resetBluetoothVariables(micIndex = -1) {
      if (micIndex >= 0) {
        // Reset specific microphone
        bluetoothDevices[micIndex] = null;
        gattServers[micIndex] = null;
        voiceServices[micIndex] = null;
        voiceDataCharacteristics[micIndex] = null;
      } else {
        // Reset all microphones
        bluetoothDevices = [null, null];
        gattServers = [null, null];
        voiceServices = [null, null];
        voiceDataCharacteristics = [null, null];
        fullPcmDataArray = [];
        isProcessingData = false;
      }
    }

    // Modified startBluetoothRecording function - adapted for multiple microphones
    function startBluetoothRecording() {

      // Update current active microphone UI
      const activeMicBtn = activeMicIndex === 0 ? gmicMicBtn : gmicMicBtn2;

      // Stop current TTS playback
      stopCurrentTTS();

      // Prevent repeated startup - 移到最前面检查
      if (isBluetoothRecording && !isProcessingData) {
        console.log("[录音控制] 已在录音中，忽略重复启动请求");
        isRecognizerInitializing = false; // Reset initialization flag
        return;
      }

      // Initialize streaming controller (用于播放队列)
      if (!streamingController) {
        initStreamingController();
      }

      // 重要：重置streamingController状态，避免阻止TTS
      if (streamingController) {
        streamingController.isActive = false;
        streamingController.sessionHandledTTS = false;
        streamingController.queueManager.reset();
        // 清空 ttsPlayer 队列，防止残留项在后续 playNext() 中被意外重放
        streamingController.ttsPlayer.stop();
      }

      // 启动分段处理器会话（优先使用分段处理模式）
      if (SEGMENT_CONFIG.enabled) {
        // 不启动streamingController的session，避免重复TTS处理
        // 但保留其ttsPlayer用于播放
        if (!segmentProcessor) {
          initSegmentProcessor();
        }
        segmentProcessor.startSession();
        // 设置TTS就绪回调 - 立即播放准备好的分段
        segmentProcessor.onSegmentReady = (segment) => {
          console.log(`[SegmentProcessor] 分段 #${segment.id} TTS就绪，加入播放队列`);
          if (streamingController && streamingController.ttsPlayer) {
            // 创建一个兼容的sentence对象
            const pseudoSentence = {
              id: `seg_${segment.id}`,
              text: segment.text,
              translatedText: segment.translatedText,
              audioBlob: segment.ttsBlob,
              audioUrl: segment.ttsUrl,
              status: 'tts_ready'
            };
            streamingController.ttsPlayer.queue.push(pseudoSentence);
            // 如果没有在播放，开始播放
            if (!streamingController.ttsPlayer.isPlaying) {
              streamingController.ttsPlayer.playNext();
            }
          }
        };
      }
      // 注意：分段处理禁用时，不启动streamingController.startSession()
      // 使用纯turn-based模式，TTS由handleInput/processPcmData直接处理
      
      // Reset recording status variables - more thoroughly clean all status
      isBluetoothRecording = true;
      fullPcmDataArray = [];
      lastDataReceivedTime = Date.now();
      sttConnectionFailed = false; // Reset connection status flag
      audioRetryCount = 0; // Reset retry counter
      recognizerInitComplete = false; // Reset initialization completion flag

      // Reset real-time transcription first reception flag
      window.hasFirstTranscription = false;

      // Reset STT status display
      // STT status reset
      
      // Start recording duration timer
      bleRecordStartTime = Date.now();
      if (bleRecordTimer) {
        clearInterval(bleRecordTimer);
      }
      bleRecordTimer = setInterval(updateBleRecordingTime, 500);

      // Update UI status
      activeMicBtn.classList.remove('waiting');
      activeMicBtn.classList.add('recording');
      activeMicBtn.innerHTML = `<i class="fas fa-microphone"></i> GMIC ${activeMicIndex+1} Initializing... (00:00)`;

      // BLE麦克风使用 Whisper 流式转写（turn-based模式）
      updateSTTDebugStatus("BLE mic recording, using Whisper transcription", 'info');

      // Start data check timer
    if (checkDataTimeoutInterval) {
      clearInterval(checkDataTimeoutInterval);
    }
    checkDataTimeoutInterval = setInterval(checkDataTimeout, 500);
  }

    // Function to update recording duration display
    function updateBleRecordingTime() {
      if (!bleRecordStartTime || !isBluetoothRecording || activeMicIndex < 0) return;
      
      // 使用当前时间减去开始时间，确保计算正确的秒数
      const elapsed = Math.floor((Date.now() - bleRecordStartTime) / 1000);
      const mm = String(Math.floor(elapsed / 60)).padStart(2, "0");
      const ss = String(elapsed % 60).padStart(2, "0");
      
      // Update current active microphone recording button duration display
      const activeMicBtn = activeMicIndex === 0 ? gmicMicBtn : gmicMicBtn2;
      
      if (activeMicBtn.innerHTML.includes("GMIC")) {
        activeMicBtn.innerHTML = `<i class="fas fa-microphone"></i> GMIC ${activeMicIndex+1} Recording (${mm}:${ss})`;
      }
    }

    // Note: resetRecordingState is defined earlier with full state reset

    // 解码ADPCM数据为PCM 并返回 Int16Array
    function decodeADPCM(adpcmData) {
      // 确保adpcmData是数组格式
      const adpcmArray = Array.from(adpcmData);
      
      // 先解码到PCM数组
      let pcmData = [];
      adpcmToPcm(adpcmArray, pcmData);
      
      // 创建Int16Array（PCM16格式）
      const pcmInt16 = new Int16Array(pcmData.length / 2);
      for (let i = 0; i < pcmData.length; i += 2) {
        pcmInt16[i/2] = (pcmData[i+1] << 8) | pcmData[i];
      }
      
      return pcmInt16;
    }

    
    // updateSTTDebugStatus kept as empty stub (called by Deepgram/Whisper code)
    function updateSTTDebugStatus() {}

    // showTranscription: display real-time transcription results
    function showTranscription(text) {
      if (!text || text.trim() === "") return;

      // 如果是首次收到结果，清空输入框
      if (!window.hasFirstTranscription) {
        inputText.value = text;
        window.hasFirstTranscription = true;

        // 实时翻译首次接收到的文本
        performRealTimeTranslation(text);
      } else {
        // 更新输入框内容，并确保光标在末尾
        inputText.value = text;
        inputText.scrollTop = inputText.scrollHeight;

        // 实时翻译更新的文本
        performRealTimeTranslation(text);
      }

      // 记录连接状态正常
      sttConnectionFailed = false;
    }

    // 修改绑定蓝牙麦克风按钮事件
    gmicMicBtn.addEventListener('click', async () => {
        handleMicButtonClick(0);
    });

    gmicMicBtn2.addEventListener('click', async () => {
        handleMicButtonClick(1);
    });

    // 统一处理麦克风按钮点击事件
    async function handleMicButtonClick(micIndex) {
        console.log(`[页面按钮] 麦克风 ${micIndex+1} 按钮被点击`);

        if (!isBluetoothDeviceConnected(micIndex)) {
            console.log(`[页面按钮] 麦克风 ${micIndex+1} 未连接，开始连接设备`);
            const micBtn = micIndex === 0 ? gmicMicBtn : gmicMicBtn2;
            micBtn.classList.add('connecting');
            micBtn.textContent = `Connecting Mic ${micIndex+1}...`;
            await connectGMICMic(micIndex);
            console.log(`[页面按钮] 麦克风 ${micIndex+1} 连接完成`);
        } else {
            console.log(`[页面按钮] 麦克风 ${micIndex+1} 已连接，但页面按钮现在只负责连接设备`);
            console.log(`[页面按钮] 请使用物理按钮控制录音开始和停止`);
            
            // 页面按钮现在只负责连接设备，不再控制录音
            // 如果设备已连接，显示提示信息
            const micBtn = micIndex === 0 ? gmicMicBtn : gmicMicBtn2;
            if (micBtn.classList.contains('waiting')) {
                // 临时显示提示信息
                const originalText = micBtn.innerHTML;
                micBtn.innerHTML = `<i class="fas fa-info-circle"></i> 请使用物理按钮录音`;
                micBtn.style.backgroundColor = '#17a2b8';
                
                setTimeout(() => {
                    micBtn.innerHTML = originalText;
                    micBtn.style.backgroundColor = '';
                }, 2000);
            }
        }
    }

    // 初始化函数
    function initializeDefaults() {
      // 确保下拉框显示正确的默认值
      document.getElementById("manualMainLang").value = "zh";
      document.getElementById("manualTargetLang").value = "en";

      // 设置全局变量
      mainLanguage = "zh";
      targetLanguage = "en";
      userHasManualMain = true;
      userHasManualTarget = true;

      // 更新状态显示
      updateStatusUI();

      console.log("默认语言设置已初始化: ML=zh, TL=en");
    }

    // 导出选中的历史记录为txt文件
    function exportSelectedRecords() {
      const checkboxes = document.querySelectorAll('.log-item-checkbox');
      let exportContent = '';
      let hasSelected = false;
      
      checkboxes.forEach(checkbox => {
        if (checkbox.checked) {
          hasSelected = true;
          const contentDiv = checkbox.nextElementSibling;
          const timestamp = contentDiv.querySelector('p:nth-child(1)').textContent;
          const originalText = contentDiv.querySelector('p:nth-child(2)').textContent;
          const translatedText = contentDiv.querySelector('p:nth-child(3)').textContent;
          
          exportContent += `[${timestamp}]\n`;
          exportContent += `原文: ${originalText}\n`;
          exportContent += `译文: ${translatedText}\n\n`;
        }
      });
      
      if (!hasSelected) {
        alert('请至少选择一条记录进行导出');
        return;
      }
      
      // 创建并下载文件
      const blob = new Blob([exportContent], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const date = new Date();
      const fileName = `翻译记录_${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2, '0')}${date.getDate().toString().padStart(2, '0')}_${date.getHours().toString().padStart(2, '0')}${date.getMinutes().toString().padStart(2, '0')}.txt`;
      
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
    
    // 全选/取消全选功能
    function toggleSelectAll() {
      const selectAllCheckbox = document.getElementById('selectAllCheckbox');
      const checkboxes = document.querySelectorAll('.log-item-checkbox');
      
      checkboxes.forEach(checkbox => {
        checkbox.checked = selectAllCheckbox.checked;
      });
    }
    
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', async function() {
      initializeDefaults();

      // Initialize streaming TTS controller
      initStreamingController();
      console.log('[Init] 流式TTS控制器已初始化');

      // Initialize segment processor for low-latency TTS
      initSegmentProcessor();
      console.log('[Init] 分段处理器已初始化');

      // 初始化设备ID并加载历史记录
      initDeviceId();
      loadHistoryFromStorage();
      console.log('[Init] 设备ID已初始化，历史记录已加载');

      // 恢复保存的播放速度
      const savedSpeed = localStorage.getItem('savedPlaybackSpeed');
      if (savedSpeed) {
        const speed = parseFloat(savedSpeed);
        savedPlaybackSpeed = speed;
        speedRange.value = speed;
        speedValue.textContent = speed.toFixed(1) + "x";
      }

      // 绑定导出按钮事件
      document.getElementById('exportSelectedBtn').addEventListener('click', exportSelectedRecords);

      // 绑定全选复选框事件
      document.getElementById('selectAllCheckbox').addEventListener('change', toggleSelectAll);
    });

    // 初始化
    updateStatusUI();
  </script>
